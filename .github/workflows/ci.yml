name: CI

on:
  push:
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.swiftlint.yml'
      - '.swiftformat'
      - '.github/workflows/**'
  pull_request:
    branches: [main, dev]
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.swiftlint.yml'
      - '.swiftformat'
      - '.github/workflows/**'

jobs:
  lint:
    name: SwiftFormat + SwiftLint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      # Pinned: unpinned `brew install swiftformat` drifts to whatever is
      # latest on the runner, which silently activates new default rules and
      # re-breaks the lint gate against unchanged code. Pin to the version the
      # codebase is formatted with; bump deliberately + reformat in one PR.
      - name: Install SwiftFormat (pinned 0.61.1)
        run: |
          curl -fsSL -o /tmp/swiftformat.zip \
            https://github.com/nicklockwood/SwiftFormat/releases/download/0.61.1/swiftformat.zip
          unzip -o /tmp/swiftformat.zip -d /tmp/swiftformat
          BIN="$(find /tmp/swiftformat -type f -name swiftformat | head -1)"
          chmod +x "$BIN"
          sudo mv "$BIN" /usr/local/bin/swiftformat
          swiftformat --version
      - name: SwiftFormat
        run: swiftformat --lint . --reporter github-actions-log
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: SwiftLint
        run: swiftlint lint --reporter github-actions-logging

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: hermes
          POSTGRES_PASSWORD: hermes_password
          POSTGRES_DB: hermes_test
        options: >-
          --health-cmd "pg_isready -U hermes -d hermes_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    container:
      image: swift:6.3-noble

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-swift-test-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-test-

      - name: Run tests (with coverage)
        env:
          DATABASE_URL: postgres://hermes:hermes_password@postgres:5432/hermes_test
          # Test harness reads these via TestPostgres.configuration().
          POSTGRES_HOST: postgres
          POSTGRES_PORT: "5432"
          POSTGRES_USER: hermes
          POSTGRES_PASSWORD: hermes_password
          POSTGRES_DATABASE: hermes_test
          REDIS_URL: redis://redis:6379
          LOG_LEVEL: error
        # HER-310: tests share ONE `hermes_test` DB with no per-suite schema
        # isolation, and each suite migrates/queries/tears-down its own Fluent.
        # `--parallel` runs them concurrently against that shared DB → migration
        # races ("relation \"users\" does not exist"), use-after-shutdown ("No
        # default database configured"), and the AsyncKit ConnectionPool deinit
        # SIGILL on parallel teardown. Run serially until per-suite DB isolation
        # lands (the real fix for getting parallelism back).
        run: swift test --enable-code-coverage

      - name: Export coverage to lcov
        # Best-effort; emits a workflow notice on failure but does not
        # break the build. Coverage is informational until we wire a
        # dashboard upload step.
        # `shell: bash` is required: the default shell inside the
        # `swift:6.3-noble` container is `dash`, which rejects both
        # `set -o pipefail` and the `[[ ]]` test below ("Illegal option
        # -o pipefail", exit 2).
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          BIN_PATH=$(swift build --show-bin-path)
          PROFDATA="${BIN_PATH}/codecov/default.profdata"
          XCTEST_PATH=$(find "${BIN_PATH}" -name '*.xctest' -print -quit)
          if [[ -f "${PROFDATA}" && -n "${XCTEST_PATH}" ]]; then
            llvm-cov export \
              -format=lcov \
              -instr-profile "${PROFDATA}" \
              "${XCTEST_PATH}/${XCTEST_PATH##*/}" \
              > coverage.lcov || true
          else
            echo "::notice::coverage artefacts not found; skipping export"
            : > coverage.lcov
          fi

      - name: Upload coverage artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage.lcov
          if-no-files-found: ignore
