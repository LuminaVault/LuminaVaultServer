name: CI

on:
  push:
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.swiftlint.yml'
      - '.swiftformat'
      - 'scripts/ci-test-wrapper.sh'
      - 'docker-compose*.yml'
      - 'Caddyfile'
      - '.env.example'
      - 'otel-collector-config*.yaml'
      - '.github/workflows/**'
  pull_request:
    branches: [main, dev]
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.swiftlint.yml'
      - '.swiftformat'
      - 'scripts/ci-test-wrapper.sh'
      - 'docker-compose*.yml'
      - 'Caddyfile'
      - '.env.example'
      - 'otel-collector-config*.yaml'
      - '.github/workflows/**'

jobs:
  config-validation:
    name: Compose Configuration
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Validate development and production Compose models
        env:
          APP_IMAGE: example.invalid/luminavault:ci
          CORS_ALLOWEDORIGINS: https://app.example.test
          HERMES_API_KEY: 0123456789abcdef0123456789abcdef
          JWT_HMAC_SECRET: ci-only-secret-at-least-32-characters
          PLUGIN_ARTIFACT_SIGNING_KEY: ci-only-artifact-signing-key
          PLUGIN_RUNNER_TOKEN: ci-only-plugin-runner-token
          POSTGRES_PASSWORD: ci-only-postgres-password
          SENTRY_AUTH_TOKEN: ci-only-sentry-token
          SENTRY_ORG_SLUG: ci-org
          SENTRY_PROJECT_SLUG: ci-project
          TEAM_INVITE_BASE_URL: https://app.example.test/invites
        run: |
          docker compose -f docker-compose.yml config --quiet
          docker compose -f docker-compose.production.yml config --quiet

  lint:
    name: SwiftFormat + SwiftLint
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      # Pinned: unpinned `brew install swiftformat` drifts to whatever is
      # latest on the runner, which silently activates new default rules and
      # re-breaks the lint gate against unchanged code. Pin to the version the
      # codebase is formatted with; bump deliberately + reformat in one PR.
      - name: Install SwiftFormat (pinned 0.61.1)
        run: |
          curl -fsSL -o /tmp/swiftformat.zip \
            https://github.com/nicklockwood/SwiftFormat/releases/download/0.61.1/swiftformat.zip
          unzip -o /tmp/swiftformat.zip -d /tmp/swiftformat
          BIN="$(find /tmp/swiftformat -type f -name swiftformat | head -1)"
          chmod +x "$BIN"
          sudo mv "$BIN" /usr/local/bin/swiftformat
          swiftformat --version
      - name: SwiftFormat
        run: swiftformat --lint . --reporter github-actions-log
      - name: Install SwiftLint (pinned 0.63.3)
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/swiftlint.zip \
            "https://github.com/realm/SwiftLint/releases/download/0.63.3/portable_swiftlint.zip"
          unzip -o /tmp/swiftlint.zip -d /tmp/swiftlint
      - name: SwiftLint
        run: /tmp/swiftlint/swiftlint lint --reporter github-actions-logging

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    container:
      image: swift:6.3-noble

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-swift-unit-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-unit-
            ${{ runner.os }}-swift-test-

      - name: Build test bundle
        run: swift build --build-tests -c debug

      - name: Run unit tests (parallel)
        env:
          LOG_LEVEL: error
          # IntegrationDatabaseTrait skips test bodies when this is set,
          # replacing the unsupported `swift test --skip-tags` CLI flag.
          SKIP_INTEGRATION_TESTS: "1"
        # ci-test-wrapper tolerates the HER-310 teardown SIGILL only when the
        # xunit report proves a clean run — real failures still fail the job.
        run: bash scripts/ci-test-wrapper.sh .build/xunit-unit.xml -c debug --parallel --skip-build

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: test-unit

    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: hermes
          POSTGRES_PASSWORD: hermes_password
          POSTGRES_DB: hermes_test
        options: >-
          --health-cmd "pg_isready -U hermes -d hermes_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    container:
      image: swift:6.3-noble

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-swift-integration-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-integration-
            ${{ runner.os }}-swift-unit-
            ${{ runner.os }}-swift-test-

      - name: Prime base test database
        env:
          POSTGRES_HOST: postgres
          POSTGRES_PORT: "5432"
          POSTGRES_USER: hermes
          POSTGRES_PASSWORD: hermes_password
          POSTGRES_DATABASE: hermes_test
          LOG_LEVEL: error
        # One serial migrate of `hermes_test`; per-suite clones use it as a
        # template so parallel integration boots skip redundant migration work.
        run: bash scripts/ci-test-wrapper.sh .build/xunit-prime.xml --filter PrimeBaseDatabaseTests --no-parallel

      - name: Run integration tests (parallel, per-suite DB)
        env:
          DATABASE_URL: postgres://hermes:hermes_password@postgres:5432/hermes_test
          POSTGRES_HOST: postgres
          POSTGRES_PORT: "5432"
          POSTGRES_USER: hermes
          POSTGRES_PASSWORD: hermes_password
          POSTGRES_DATABASE: hermes_test
          REDIS_URL: redis://redis:6379
          LOG_LEVEL: error
          # Non-integration suites carry `.skipInIntegrationJob` so this job
          # only executes Postgres-backed tests (already run in test-unit).
          RUN_INTEGRATION_ONLY: "1"
        run: bash scripts/ci-test-wrapper.sh .build/xunit-integration.xml --parallel --enable-code-coverage

      - name: Export coverage to lcov
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          BIN_PATH=$(swift build --show-bin-path)
          PROFDATA="${BIN_PATH}/codecov/default.profdata"
          XCTEST_PATH=$(find "${BIN_PATH}" -name '*.xctest' -print -quit)
          if [[ -f "${PROFDATA}" && -n "${XCTEST_PATH}" ]]; then
            llvm-cov export \
              -format=lcov \
              -instr-profile "${PROFDATA}" \
              "${XCTEST_PATH}/${XCTEST_PATH##*/}" \
              > coverage.lcov || true
          else
            echo "::notice::coverage artefacts not found; skipping export"
            : > coverage.lcov
          fi

      - name: Upload coverage artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage.lcov
          if-no-files-found: ignore
