name: CI

on:
  push:
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.swiftlint.yml'
      - '.swiftformat'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'Sources/**'
      - 'Tests/**'
      - 'Package.swift'
      - 'Package.resolved'
      - '.swiftlint.yml'
      - '.swiftformat'
      - '.github/workflows/**'

jobs:
  lint:
    name: SwiftFormat + SwiftLint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftFormat
        run: brew install swiftformat
      - name: SwiftFormat
        run: swiftformat --lint . --reporter github-actions-log
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: SwiftLint
        run: swiftlint lint --reporter github-actions-logging

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: hermes
          POSTGRES_PASSWORD: hermes_password
          POSTGRES_DB: hermes_test
        options: >-
          --health-cmd "pg_isready -U hermes -d hermes_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    container:
      image: swift:6.3-noble

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-swift-test-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-test-

      - name: Run tests (with coverage)
        env:
          DATABASE_URL: postgres://hermes:hermes_password@postgres:5432/hermes_test
          # Test harness reads these via TestPostgres.configuration().
          POSTGRES_HOST: postgres
          POSTGRES_PORT: "5432"
          POSTGRES_USER: hermes
          POSTGRES_PASSWORD: hermes_password
          POSTGRES_DATABASE: hermes_test
          REDIS_URL: redis://redis:6379
          LOG_LEVEL: error
        run: swift test --parallel --enable-code-coverage

      - name: Export coverage to lcov
        # Best-effort; emits a workflow notice on failure but does not
        # break the build. Coverage is informational until we wire a
        # dashboard upload step.
        if: always()
        run: |
          set -euo pipefail
          BIN_PATH=$(swift build --show-bin-path)
          PROFDATA="${BIN_PATH}/codecov/default.profdata"
          XCTEST_PATH=$(find "${BIN_PATH}" -name '*.xctest' -print -quit)
          if [[ -f "${PROFDATA}" && -n "${XCTEST_PATH}" ]]; then
            llvm-cov export \
              -format=lcov \
              -instr-profile "${PROFDATA}" \
              "${XCTEST_PATH}/${XCTEST_PATH##*/}" \
              > coverage.lcov || true
          else
            echo "::notice::coverage artefacts not found; skipping export"
            : > coverage.lcov
          fi

      - name: Upload coverage artefact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: coverage.lcov
          if-no-files-found: ignore
