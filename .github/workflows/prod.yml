name: Deploy

# HER-272: deploy is gated on CI. It only runs after the `CI` workflow
# completes successfully on `main` (via `workflow_run`), so a failing
# `test` or `lint` job blocks the deploy. `workflow_dispatch` stays for
# manual redeploys / rollbacks.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    # Only build/deploy when CI passed (or on a manual dispatch).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write

    outputs:
      app_image: ${{ steps.refs.outputs.app_image }}
      image_repository: ${{ steps.refs.outputs.image_repository }}
      image_sha_tag: ${{ steps.refs.outputs.image_sha_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # workflow_run runs in the default-branch context; check out the
          # exact commit CI validated so the image matches what was tested.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve image references
        id: refs
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          IMAGE_REPOSITORY="${REGISTRY}/${IMAGE_NAME,,}"
          IMAGE_SHA_TAG="${HEAD_SHA}"
          APP_IMAGE="${IMAGE_REPOSITORY}:${IMAGE_SHA_TAG}"
          echo "image_repository=${IMAGE_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "image_sha_tag=${IMAGE_SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "app_image=${APP_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_REPOSITORY=${IMAGE_REPOSITORY}" >> "$GITHUB_ENV"
          echo "IMAGE_SHA_TAG=${IMAGE_SHA_TAG}" >> "$GITHUB_ENV"
          echo "APP_IMAGE=${APP_IMAGE}" >> "$GITHUB_ENV"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_SHA_TAG }}
            ${{ env.IMAGE_REPOSITORY }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: read

    steps:
      - name: Validate SSH secrets
        run: |
          test -n "${{ secrets.SERVER_HOST }}" || (echo "SERVER_HOST is empty" && exit 1)
          test -n "${{ secrets.SERVER_USER }}" || (echo "SERVER_USER is empty" && exit 1)
          test -n "${{ secrets.SERVER_SSH_KEY }}" || (echo "SERVER_SSH_KEY is empty" && exit 1)

      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/obsidian-claudebrain

            # HER-272: record the image to roll back to if this release
            # fails its smoke test — the last image promoted to "green"
            # (falls back to whatever is currently live if no green
            # pointer exists yet). Consumed by the rollback step below.
            if [ -s .green_image ]; then
              cp .green_image .rollback_image
            else
              sed -n 's/^APP_IMAGE=//p' .env.production > .rollback_image || true
            fi

            # Ensure clean working tree before updating
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            APP_IMAGE="${{ needs.build.outputs.app_image }}"
            POSTHOG_OTEL_TOKEN="${{ secrets.POSTHOG_OTEL_TOKEN }}"
            SENTRY_BASE_URL="${{ secrets.SENTRY_BASE_URL }}"
            SENTRY_ORG_SLUG="${{ secrets.SENTRY_ORG_SLUG }}"
            SENTRY_PROJECT_SLUG="${{ secrets.SENTRY_PROJECT_SLUG }}"
            SENTRY_AUTH_TOKEN="${{ secrets.SENTRY_AUTH_TOKEN }}"
            SENTRY_ENVIRONMENT="${{ secrets.SENTRY_ENVIRONMENT }}"
            SENTRY_RELEASE="${{ github.sha }}"

            # HER-131: backup config. Each is optional — an unset secret leaves
            # any value already in .env.production untouched (see the write loop
            # below), so you can configure backups by hand on the VPS instead.
            # The backup profile is only brought up when recipient + remote are
            # both present (further down).
            BACKUP_AGE_RECIPIENT="${{ secrets.BACKUP_AGE_RECIPIENT }}"
            BACKUP_RCLONE_REMOTE="${{ secrets.BACKUP_RCLONE_REMOTE }}"
            BACKUP_ALERT_WEBHOOK="${{ secrets.BACKUP_ALERT_WEBHOOK }}"

            # Login to container registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull immutable image built in CI
            docker pull "${APP_IMAGE}"

            # Persist currently deployed image reference
            if grep -q '^APP_IMAGE=' .env.production; then
              sed -i "s|^APP_IMAGE=.*|APP_IMAGE=${APP_IMAGE}|" .env.production
            else
              echo "APP_IMAGE=${APP_IMAGE}" >> .env.production
            fi

            # HER-236: PostHog OTel token consumed by the otel-collector container.
            if [ -n "${POSTHOG_OTEL_TOKEN}" ]; then
              if grep -q '^POSTHOG_OTEL_TOKEN=' .env.production; then
                sed -i "s|^POSTHOG_OTEL_TOKEN=.*|POSTHOG_OTEL_TOKEN=${POSTHOG_OTEL_TOKEN}|" .env.production
              else
                echo "POSTHOG_OTEL_TOKEN=${POSTHOG_OTEL_TOKEN}" >> .env.production
              fi
            fi
            for key in SENTRY_BASE_URL SENTRY_ORG_SLUG SENTRY_PROJECT_SLUG SENTRY_AUTH_TOKEN SENTRY_ENVIRONMENT SENTRY_RELEASE \
                       BACKUP_AGE_RECIPIENT BACKUP_RCLONE_REMOTE BACKUP_ALERT_WEBHOOK; do
              value="$(printenv "$key" || true)"
              if [ -n "${value}" ]; then
                if grep -q "^${key}=" .env.production; then
                  sed -i "s|^${key}=.*|${key}=${value}|" .env.production
                else
                  echo "${key}=${value}" >> .env.production
                fi
              fi
            done

            ln -sf /opt/obsidian-claudebrain/.env.production /opt/obsidian-claudebrain/.env

            export APP_IMAGE
            export APP_PORT=8080

            # HER-236: bring up otel-collector before app so /v1/health logs go through.
            APP_PORT=8080 APP_IMAGE="${APP_IMAGE}" docker compose -p prod \
              -f docker-compose.production.yml \
              --env-file .env.production \
              up -d --no-deps otel-collector

            # Deploy
            APP_PORT=8080 APP_IMAGE="${APP_IMAGE}" docker compose -p prod \
              -f docker-compose.production.yml \
              --env-file .env.production \
              up -d --no-deps app

            # TLS + HTTP/2 front door. Created/refreshed each deploy so a
            # Caddyfile change ships without a manual step. ACME issuance only
            # succeeds once DNS for the configured domain points at this host;
            # before that Caddy serves its internal CA and the public HTTPS
            # smoke gate below stays red (expected during initial bring-up).
            APP_PORT=8080 APP_IMAGE="${APP_IMAGE}" docker compose -p prod \
              -f docker-compose.production.yml \
              --env-file .env.production \
              up -d --no-deps caddy

            # On-server health pre-gate (fast, localhost). A failure here
            # fails the step and triggers the rollback step below; the
            # public smoke test (next step) is the authoritative gate.
            HEALTHY=0
            for ATTEMPT in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:8080/health >/dev/null 2>&1; then
                HEALTHY=1
                break
              fi
              sleep 2
            done

            if [ "${HEALTHY}" -ne 1 ]; then
              echo "On-server health check failed for ${APP_IMAGE}"
              APP_PORT=8080 APP_IMAGE="${APP_IMAGE}" docker compose -p prod \
                -f docker-compose.production.yml logs --tail=120 app
              exit 1
            fi

            # HER-131: bring up the encrypted backup sidecar when configured.
            # Reads the persisted .env.production so a hand-configured VPS works
            # even when the GH secrets are unset. Requires ./secrets/rclone.conf
            # and the age identity to already exist on the host (one-time setup;
            # see docs/backup.md). A backup failure does NOT fail the deploy.
            if grep -qE '^BACKUP_AGE_RECIPIENT=.+' .env.production \
               && grep -qE '^BACKUP_RCLONE_REMOTE=.+' .env.production; then
              if [ -f ./secrets/rclone.conf ]; then
                echo "Backups configured — bringing up backup profile"
                APP_PORT=8080 APP_IMAGE="${APP_IMAGE}" docker compose -p prod \
                  -f docker-compose.production.yml \
                  --env-file .env.production \
                  --profile backup \
                  up -d --build --no-deps backup || echo "WARN: backup service failed to start (non-fatal)"
              else
                echo "WARN: BACKUP_* set but ./secrets/rclone.conf missing — skipping backup profile (see docs/backup.md)"
              fi
            else
              echo "Backups not configured (BACKUP_AGE_RECIPIENT / BACKUP_RCLONE_REMOTE unset) — skipping backup profile"
            fi

      # HER-272: authoritative post-deploy smoke test, run FROM THE RUNNER
      # against the public endpoint over HTTPS. NOTE: hits `/health` (the
      # public liveness probe returning "ok"), NOT `/v1/health` — the
      # latter is the JWT-authed health-data domain and returns 401.
      # Fails the job if not HTTP 200 within ~30s, which triggers rollback.
      - name: Post-deploy smoke test (public endpoint)
        env:
          HEALTH_URL: ${{ vars.PRODUCTION_HEALTH_URL || 'https://api.luminavault.fyi/health' }}
        run: |
          set -euo pipefail
          for ATTEMPT in $(seq 1 15); do
            CODE=$(curl -fsS -o /dev/null -w '%{http_code}' "${HEALTH_URL}" || true)
            if [ "${CODE}" = "200" ]; then
              echo "Smoke test passed: ${HEALTH_URL} -> 200 (attempt ${ATTEMPT})"
              exit 0
            fi
            echo "Smoke attempt ${ATTEMPT}: ${HEALTH_URL} -> ${CODE:-no-response}"
            sleep 2
          done
          echo "Smoke test FAILED: ${HEALTH_URL} did not return 200 within ~30s"
          exit 1

      # HER-272: promote the just-deployed image to "green" and prune.
      # Runs only when build + deploy + smoke all succeeded.
      - name: Promote release
        if: success()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/obsidian-claudebrain
            # Record the most-recent-green image pointer (see docs/deploy.md).
            echo "${{ needs.build.outputs.app_image }}" > .green_image
            rm -f .rollback_image
            # Cleanup old images older than 7 days.
            docker image prune -af --filter "until=168h"

      # HER-272: automatic rollback. Runs only if a prior step failed
      # (deploy error or smoke test not 200). Redeploys the last-known-good
      # image recorded in .rollback_image. The job stays red regardless.
      - name: Roll back on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/obsidian-claudebrain
            if [ ! -s .rollback_image ]; then
              echo "No .rollback_image recorded; cannot auto-roll back. Manual intervention required (see docs/deploy.md)."
              exit 0
            fi
            ROLLBACK_IMAGE="$(cat .rollback_image)"
            echo "Rolling back to ${ROLLBACK_IMAGE}"
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            docker pull "${ROLLBACK_IMAGE}"
            sed -i "s|^APP_IMAGE=.*|APP_IMAGE=${ROLLBACK_IMAGE}|" .env.production
            APP_PORT=8080 APP_IMAGE="${ROLLBACK_IMAGE}" docker compose -p prod \
              -f docker-compose.production.yml \
              --env-file .env.production \
              up -d --no-deps app
            echo "Rollback redeploy issued for ${ROLLBACK_IMAGE}"

      # HER-272: deploy notification (success + failure). Posts to a Discord
      # channel webhook; no-ops unless DISCORD_WEBHOOK_URL is configured.
      - name: Notify deploy result
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "::notice::deploy result=${{ job.status }} (no DISCORD_WEBHOOK_URL configured; notification skipped)"
            exit 0
          fi
          curl -fsS -X POST -H 'Content-type: application/json' \
            --data "{\"content\":\"Production deploy ${{ job.status }} for ${{ needs.build.outputs.app_image }}\"}" \
            "${DISCORD_WEBHOOK_URL}"
