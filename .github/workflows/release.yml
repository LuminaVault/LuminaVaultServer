# GitOps release: after CI passes on main, build + push the app image to
# GHCR, then commit the new tag into LuminaVaultInfra's staging values.
# ArgoCD auto-syncs staging from that commit (~3 min, hands-free).
# Production promotion stays human-gated via LuminaVaultInfra promote.yml.
#
# Coexists with prod.yml (legacy SSH deploy to the old VPS) until the k3s
# cutover completes; both push the same immutable :<sha> tag so the double
# build is idempotent. prod.yml is deleted in cutover Phase 4.
name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  INFRA_REPO: LuminaVault/LuminaVaultInfra
  STAGING_VALUES: apps/api/values-staging.yaml

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      packages: write
    outputs:
      image_sha_tag: ${{ steps.refs.outputs.image_sha_tag }}
      image_repository: ${{ steps.refs.outputs.image_repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # workflow_run executes in default-branch context; build the exact
          # commit CI validated so the image matches what was tested.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Resolve image references
        id: refs
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          IMAGE_REPOSITORY="${REGISTRY}/${IMAGE_NAME,,}"
          echo "image_repository=${IMAGE_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "image_sha_tag=${HEAD_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.refs.outputs.image_repository }}:${{ steps.refs.outputs.image_sha_tag }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.refs.outputs.image_sha_tag }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bump-staging:
    name: Bump staging image tag in LuminaVaultInfra
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Validate infra token
        env:
          INFRA_TOKEN: ${{ secrets.INFRA_REPO_TOKEN }}
        run: |
          if [ -z "$INFRA_TOKEN" ]; then
            echo "::error::INFRA_REPO_TOKEN secret is not set. Create a fine-grained PAT (contents: read/write, repo: ${INFRA_REPO}) and add it to this repo's secrets."
            exit 1
          fi

      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.INFRA_REPO }}
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra

      - name: Commit staging tag bump
        working-directory: infra
        env:
          TAG: ${{ needs.build.outputs.image_sha_tag }}
        run: |
          set -euo pipefail
          current="$(yq '.image.tag' "$STAGING_VALUES")"
          if [ "$current" = "$TAG" ]; then
            echo "staging already at ${TAG}; nothing to do"
            exit 0
          fi
          yq -i ".image.tag = \"${TAG}\"" "$STAGING_VALUES"
          git config user.name "lumina-ci"
          git config user.email "ci@luminavault.fyi"
          git add "$STAGING_VALUES"
          git commit -m "api staging → ${TAG:0:12} (LuminaVaultServer@${TAG})"
          # Retry once around a concurrent bump from another merge.
          git push origin HEAD:main || {
            git pull --rebase origin main
            git push origin HEAD:main
          }

      - name: Notify Discord
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          OUTCOME: ${{ job.status }}
          TAG: ${{ needs.build.outputs.image_sha_tag }}
        run: |
          [ -z "$DISCORD_WEBHOOK_URL" ] && exit 0
          payload=$(jq -n --arg c "Release ${OUTCOME}: api staging → ${TAG:0:12}" '{content: $c}')
          curl -fsS -X POST -H 'Content-Type: application/json' -d "$payload" "$DISCORD_WEBHOOK_URL" || true
