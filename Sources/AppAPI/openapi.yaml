          application/json:
            schema: { $ref: '#/components/schemas/UpdatePluginInstallRequest' }
      responses:
        '200':
          description: Updated install.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PluginInstallDTO' }
    delete:
      tags: [Plugins]
