      security:
        - adminToken: []
      parameters:
        - in: path
          name: userID
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Recompute summary.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminMemoryScoreResponse' }

  /v1/admin/memory/prune:
    post:
      tags: [Admin]
      operationId: adminMemoryPruneAll
      summary: Run memory pruning across all tenants.
      security:
        - adminToken: []
      responses:
        '200':
          description: Prune summary.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminMemoryPruneResponse' }

  /v1/admin/memory/prune/{userID}:
    post:
      tags: [Admin]
      operationId: adminMemoryPruneOne
      summary: Prune memories for one tenant.
      security:
        - adminToken: []
      parameters:
        - in: path
          name: userID
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Prune summary.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminMemoryPruneResponse' }

  /v1/admin/users/{userID}/tier-override:
    put:
      tags: [Admin]
      operationId: adminTierOverride
      summary: Override a user's billing tier (support / TestFlight).
      security:
        - adminToken: []
      parameters:
        - in: path
          name: userID
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TierOverrideRequest' }
      responses:
        '200':
          description: Updated user.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TierOverrideResponse' }

  # ─────────────── Hermes Profiles — multi-agent (HER-273) ─────────────

  /v1/reminders:
    get:
      tags: [Reminders]
      operationId: remindersList
      summary: List the caller's reminders.
      description: |
        Returns pending and fired reminders for the authed tenant, newest
        `fireAt` first. Firing is server-side (ReminderScheduler); a fired
        one-shot reminder carries a non-null `firedAt`.
      parameters:
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 200, default: 100 }
      responses:
        '200':
          description: Reminder list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReminderListResponse' }
    post:
      tags: [Reminders]
      operationId: remindersCreate
      summary: Create a reminder.
      description: |
        `fireAt` is the first delivery time. Set `recurrenceCron` (a 5-field
        cron expression) for a recurring reminder; omit it for one-shot.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReminderCreateRequest' }
      responses:
        '200':
          description: Created reminder.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReminderDTO' }
        '400':
          description: Missing title or invalid recurrence cron.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /v1/reminders/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [Reminders]
      operationId: remindersPatch
      summary: Update a reminder.
      description: |
        Any unset field is left unchanged. Editing `fireAt` re-arms a
        reminder that had already fired.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReminderPatchRequest' }
      responses:
        '200':
          description: Updated reminder.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReminderDTO' }
        '400':
          description: Empty title or invalid recurrence cron.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '404':
          description: Unknown reminder.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    delete:
      tags: [Reminders]
      operationId: remindersDelete
      summary: Delete a reminder.
      responses:
        '204':
          description: Row deleted.
        '404':
          description: Unknown reminder.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /v1/projects:
    get:
      tags: [Projects]
      operationId: projectsList
      summary: List the caller's projects.
      description: Projects group note-todos. Each carries a live `todoCount`.
      parameters:
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 200, default: 100 }
      responses:
        '200':
          description: Project list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectListResponse' }
    post:
      tags: [Projects]
      operationId: projectsCreate
      summary: Create a project.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProjectCreateRequest' }
      responses:
        '200':
          description: Created project.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectDTO' }
        '400':
          description: Missing name.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /v1/projects/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [Projects]
      operationId: projectsPatch
      summary: Update a project (name / description / archived).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProjectPatchRequest' }
      responses:
        '200':
          description: Updated project.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProjectDTO' }
        '404':
          description: Unknown project.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    delete:
      tags: [Projects]
      operationId: projectsDelete
      summary: Delete a project. Note-todos that referenced it become unfiled.
      responses:
        '204': { description: Row deleted. }
        '404':
          description: Unknown project.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /v1/todos:
    get:
      tags: [Todos]
      operationId: todosList
      summary: List the caller's todos (open first, then by soonest due).
      description: |
        A todo is a vault note whose `metadata.isTodo` is true; this API and
        the note browser are two views of the same store.
      responses:
        '200':
          description: Todo list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TodoListResponse' }
    post:
      tags: [Todos]
      operationId: todosCreate
      summary: Create a standalone todo (stored as a markdown todo-note).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TodoCreateRequest' }
      responses:
        '200':
          description: Created todo.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TodoDTO' }
        '400':
          description: Missing title.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /v1/todos/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [Todos]
      operationId: todosPatch
      summary: Toggle done / edit title, due date, or project.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TodoPatchRequest' }
      responses:
        '200':
          description: Updated todo.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TodoDTO' }
        '404':
          description: Unknown todo.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    delete:
      tags: [Todos]
      operationId: todosDelete
      summary: Delete a todo (soft-deletes the note, cascades its recall memory).
      responses:
        '204': { description: Row deleted. }
        '404':
          description: Unknown todo.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /v1/profiles:
    get:
      tags: [Profiles]
      operationId: profilesList
      summary: List the caller's Hermes personas.
      description: |
        Returns every persona owned by the authed tenant plus the slug
        of the row currently flagged as default (`activeSlug`). The
        default persona is the one used when a chat request omits
        `X-Hermes-Profile`.
      responses:
        '200':
          description: Persona list + active slug.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HermesProfilesListResponse' }
    post:
      tags: [Profiles]
      operationId: profilesCreate
      summary: Create a new Hermes persona.
      description: |
        Slug must match `^[a-z0-9][a-z0-9-]{0,31}$`. `systemPrompt` is
        used verbatim as the persona's seed system prompt unless
        `templateSlug` is also set, in which case the template body
        wins (templates: `personal-assistant`, `stocks-tracker`,
        `news-curator`, `tv-and-movies`, `tech-and-programming`).
        First persona for a tenant is auto-flagged as default.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/HermesProfileCreateRequest' }
      responses:
        '200':
          description: Created persona.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HermesProfileDTO' }
        '400':
          description: |
            Stable codes in `message`:
            `invalid_slug`, `invalid_label`, `system_prompt_too_long`,
            `template_not_found`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '409':
          description: Slug already exists for this tenant (`slug_already_exists`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /v1/profiles/{slug}:
    parameters:
      - in: path
        name: slug
        required: true
        schema: { type: string, pattern: '^[a-z0-9][a-z0-9-]{0,31}$' }
    get:
      tags: [Profiles]
      operationId: profilesGet
      summary: Get a single persona by slug.
      responses:
        '200':
          description: Persona detail.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HermesProfileDTO' }
        '404':
          description: Unknown persona (`profile_not_found`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    patch:
      tags: [Profiles]
      operationId: profilesPatch
      summary: Update a persona's label / system prompt / enabled skills.
      description: |
        Slug and default flag are immutable here; use
        `POST /v1/profiles/{slug}/activate` to switch the default.
        Any unset field is left unchanged.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/HermesProfilePatchRequest' }
      responses:
        '200':
          description: Updated persona.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HermesProfileDTO' }
        '400':
          description: |
            Stable codes in `message`:
            `invalid_label`, `system_prompt_too_long`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '404':
          description: Unknown persona (`profile_not_found`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    delete:
      tags: [Profiles]
      operationId: profilesDelete
      summary: Delete a non-default persona.
      responses:
        '204':
          description: Row deleted.
        '404':
          description: Unknown persona (`profile_not_found`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '409':
          description: Cannot delete the default persona (`cannot_delete_default`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /v1/profiles/{slug}/activate:
    parameters:
      - in: path
        name: slug
        required: true
        schema: { type: string, pattern: '^[a-z0-9][a-z0-9-]{0,31}$' }
    post:
      tags: [Profiles]
      operationId: profilesActivate
      summary: Set this persona as the tenant's default.
      description: |
        Atomically clears the prior default and flags this slug.
        Subsequent chat requests with no `X-Hermes-Profile` header
        will resolve to this slug. Idempotent: activating the
        already-default persona is a no-op.
      responses:
        '200':
          description: Activation acknowledged.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HermesProfileActivateResponse' }
        '404':
          description: Unknown persona (`profile_not_found`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  # ─────────────────────────── System / Hermes update ──────────────────────
  # HER-330 — owner-triggered "Update Hermes" flow. Every route requires BOTH
  # the owner JWT AND the shared admin token (X-Admin-Token header), since an
  # update affects every tenant on the box.

  /v1/system/hermes/version:
    get:
      tags: [System]
      operationId: systemHermesVersion
      summary: Current central Hermes image + available-update info.
      security:
        - bearerJWT: []
          adminTokenHeader: []
      responses:
        '200':
          description: Version info.
          content:
            application/json:
              schema:
                type: object
                required: [info]
                properties:
                  info: { $ref: '#/components/schemas/HermesVersionInfo' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /v1/system/hermes/update:
    post:
      tags: [System]
      operationId: systemHermesUpdateStart
      summary: Start a Hermes self-update (detached, blue-green).
      security:
        - bearerJWT: []
          adminTokenHeader: []
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StartHermesUpdateRequest' }
      responses:
        '200':
          description: Job accepted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StartHermesUpdateResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409':
          description: An update is already in progress.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /v1/system/hermes/update/current:
    get:
      tags: [System]
      operationId: systemHermesUpdateCurrent
      summary: Most recent in-flight (or last) update job, for reconnect.
      security:
        - bearerJWT: []
          adminTokenHeader: []
      responses:
        '200':
          description: Job snapshot.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { $ref: '#/components/schemas/HermesUpdateJobStatus' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/system/hermes/update/{jobID}:
    get:
      tags: [System]
      operationId: systemHermesUpdateStatus
      summary: Full status snapshot for one update job (poll fallback).
      security:
        - bearerJWT: []
          adminTokenHeader: []
      parameters:
        - in: path
          name: jobID
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Job snapshot.
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { $ref: '#/components/schemas/HermesUpdateJobStatus' }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/system/hermes/update/{jobID}/stream:
    get:
      tags: [System]
      operationId: systemHermesUpdateStream
      summary: SSE stream of HermesUpdateEvent for one job.
      description: >
        `text/event-stream`; each `data:` line is one JSON-encoded
        `HermesUpdateEvent` (discriminated by `type`), blank-line terminated.
      security:
        - bearerJWT: []
          adminTokenHeader: []
      parameters:
        - in: path
          name: jobID
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Event stream.
          content:
            text/event-stream:
              schema: { type: string }
        '404': { $ref: '#/components/responses/NotFound' }

  /v1/system/hermes/update/{jobID}/rollback:
    post:
      tags: [System]
      operationId: systemHermesUpdateRollback
      summary: Manually roll a failed update back to its previous version.
      security:
        - bearerJWT: []
          adminTokenHeader: []
      parameters:
        - in: path
          name: jobID
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Rollback job accepted.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StartHermesUpdateResponse' }
        '400':
          description: Rollback unavailable (no recorded previous version).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '409':
          description: An update is already in progress.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /v1/system/hermes/reprovision:
    post:
      tags: [System]
      operationId: systemHermesReprovision
      summary: Bulk-reprovision all per-tenant Hermes containers onto the current image.
      description: >
        Force-removes then re-creates every per-tenant Hermes container,
        re-seeding `config.yaml` from the latest template. The per-tenant data
        volume (memory DB + auth.json) is bind-mounted and untouched, so no
        data is lost. Idempotent. Does NOT run a central blue-green update.
      security:
        - bearerJWT: []
          adminTokenHeader: []
      responses:
        '200':
          description: Reprovision complete.
          content:
            application/json:
              schema:
                type: object
                required: [reprovisioned]
                properties:
                  reprovisioned:
                    type: integer
                    description: Number of tenant containers reprovisioned.
        '401': { $ref: '#/components/responses/Unauthorized' }
        '503':
          description: Per-tenant containers are disabled on this server.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

components:

  securitySchemes:
    bearerJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: HMAC HS256 session token (`SessionToken` — see jwt-kit usage).
    adminToken:
      type: http
      scheme: bearer
      description: Shared-secret bearer (`admin.token` env var).
    adminTokenHeader:
      type: apiKey
      in: header
      name: X-Admin-Token
      description: >
        HER-330 — shared admin secret (`admin.token`) presented in the
        `X-Admin-Token` header. Required (in addition to the owner JWT) on
        the system Hermes-update routes.
    revenueCatWebhookSecret:
      type: http
      scheme: bearer
      description: RevenueCat webhook shared secret (`revenuecat.webhookSecret`).

  parameters:
    MemoryId:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: false
      description: >
        HER-39 — client-generated UUIDv4. Retrying a mutating request with the
        same key (within 24 h) replays the cached response instead of
        re-executing the handler. Reusing a key with a different request body
        returns 409. Tenant-scoped: the same key value across different tenants
        does not collide.
      schema: { type: string, format: uuid }

  responses:
    Unauthorized:
      description: Missing / invalid credential.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    Conflict:
      description: Resource conflict (e.g. duplicate registration).
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    RateLimited:
      description: Rate-limit exceeded; honour `Retry-After`.
      headers:
        Retry-After:
          schema: { type: integer }
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  schemas:

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error: { type: string }
        message: { type: string }

    # ── HER-330 Hermes self-update ──
    HermesVersionInfo:
      type: object
      required: [currentRef, currentLabel, updateAvailable]
      properties:
        currentRef: { type: string }
        currentDigest: { type: string, nullable: true }
        currentLabel: { type: string }
        availableLabel: { type: string, nullable: true }
        updateAvailable: { type: boolean }
        lastUpdatedAt: { type: string, format: date-time, nullable: true }

    StartHermesUpdateRequest:
      type: object
      properties:
        targetTag:
          type: string
          nullable: true
          description: Release-channel tag to pull; defaults to the server's channel.

    StartHermesUpdateResponse:
      type: object
      required: [jobID, state]
      properties:
        jobID: { type: string, format: uuid }
        state: { $ref: '#/components/schemas/HermesUpdateJobState' }

    HermesUpdateJobState:
      type: string
      enum: [running, succeeded, failed, rolledBack]

    HermesUpdateStepID:
      type: string
      enum: [preflight, pullImage, verifyImage, snapshotCurrent, swapCentral, healthCheckCentral, reprovisionTenants, verifyTenants, promote, rollback]

    HermesUpdateStepState:
      type: string
      enum: [pending, running, succeeded, failed, skipped]

    HermesUpdateStep:
      type: object
      required: [id, state]
      properties:
        id: { $ref: '#/components/schemas/HermesUpdateStepID' }
        state: { $ref: '#/components/schemas/HermesUpdateStepState' }
        detail: { type: string, nullable: true }
        startedAt: { type: string, format: date-time, nullable: true }
        finishedAt: { type: string, format: date-time, nullable: true }

    HermesUpdateJobStatus:
      type: object
      required: [jobID, state, steps, startedAt, updatedAt]
      properties:
        jobID: { type: string, format: uuid }
        state: { $ref: '#/components/schemas/HermesUpdateJobState' }
        steps:
          type: array
          items: { $ref: '#/components/schemas/HermesUpdateStep' }
        fromVersion: { type: string, nullable: true }
        toVersion: { type: string, nullable: true }
        errorMessage: { type: string, nullable: true }
        startedAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    HermesUpdateEvent:
      type: object
      description: >
        SSE frame discriminated by `type`. `payload` shape depends on `type`:
        step→HermesUpdateStep, status→HermesUpdateJobState string,
        done→HermesUpdateJobStatus, error→string.
      required: [type]
      properties:
        type:
          type: string
          enum: [step, status, done, error]
        payload: {}

    UpstreamError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum:
                - upstream_timeout
                - upstream_unreachable
                - upstream_rejected
                - upstream_error
                - rate_limit
                - credit_exhausted
                - network
                - no_providers
              description: Machine-readable reason code. Stable; clients localize via this.
            message:
              type: string
              description: Human-readable explanation safe to display.
            retry_after_ms:
              type: integer
              format: int32
              minimum: 0
              description: Optional client hint for retry delay in milliseconds.

    # ── Auth ──

    RegisterRequest:
      type: object
      required: [email, username, password]
      properties:
        email: { type: string, format: email }
        username: { type: string, minLength: 3 }
        password: { type: string, minLength: 12 }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string }

    AuthResponse:
      type: object
      required: [accessToken, userId, vaultInitialized]
      properties:
        accessToken: { type: string }
        refreshToken: { type: string }
        expiresIn: { type: integer }
        userId: { type: string, format: uuid }
        username: { type: string }
        email: { type: string, format: email }
        vaultInitialized:
          type: boolean
          description: HER-35 — false until `POST /v1/vault/create` runs; clients gate the "Create My Vault" screen on this flag.

    EmailOnlyRequest:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email }

    EmailConfirmRequest:
      type: object
      required: [code]
      properties:
        code: { type: string }

    ResetPasswordRequest:
      type: object
      required: [email, code, newPassword]
      properties:
        email: { type: string, format: email }
        code: { type: string }
        newPassword: { type: string, minLength: 12 }

    MFAVerifyRequest:
      type: object
      required: [challengeId, code]
      properties:
        challengeId: { type: string }
        code: { type: string }

    MFAResendRequest:
      type: object
      required: [challengeId]
      properties:
        challengeId: { type: string }

    OAuthIDTokenRequest:
      type: object
      required: [idToken]
      properties:
        idToken: { type: string }

    OAuthAccessTokenRequest:
      type: object
      required: [accessToken]
      properties:
        accessToken: { type: string }

    PhoneStartRequest:
      type: object
      required: [phoneE164]
      properties:
        phoneE164: { type: string }

    PhoneVerifyRequest:
      type: object
      required: [phoneE164, code]
      properties:
        phoneE164: { type: string }
        code: { type: string }

    EmailMagicVerifyRequest:
      type: object
      required: [email, code]
      properties:
        email: { type: string, format: email }
        code: { type: string }

    WebAuthnBeginRegistrationRequest:
      type: object
      required: [username]
      properties:
        username: { type: string }
        displayName: { type: string, nullable: true }

    WebAuthnAuthOptionsRequest:
      type: object
      required: [username]
      properties:
        username: { type: string }

    WebAuthnOptions:
      type: object
      description: |
        Opaque PublicKeyCredentialCreationOptions / RequestOptions JSON
        as returned by the WebAuthn relying-party library. Forwarded
        verbatim to the iOS / browser WebAuthn API.
      additionalProperties: true

    WebAuthnFinish:
      type: object
      description: |
        Browser/iOS-returned PublicKeyCredential JSON. Forwarded verbatim
        to the relying-party library for verification.
      additionalProperties: true

    WebAuthnFinishRegistrationResponse:
      type: object
      required: [credentialID]
      properties:
        credentialID: { type: string, description: "Base64url credential ID." }

    WebAuthnCredentialSummary:
      type: object
      required: [id, createdAt]
      properties:
        id: { type: string, description: "Base64url credential ID." }
        createdAt: { type: string, format: date-time }
        lastUsedAt: { type: string, format: date-time, nullable: true }
        nickname: { type: string, nullable: true }

    WebAuthnCredentialListResponse:
      type: object
      required: [credentials]
      properties:
        credentials:
          type: array
          items: { $ref: '#/components/schemas/WebAuthnCredentialSummary' }

    # ── Me ──

    MeResponse:
      type: object
      required: [userId, email, username, isVerified]
      properties:
        userId: { type: string, format: uuid }
        email: { type: string, format: email }
        username: { type: string }
        isVerified: { type: boolean }
        privacyNoCNOrigin: { type: boolean }
        contextRouting: { type: boolean }
        autoSaveLinks:
          type: boolean
          description: |
            HER-274 — gates the chat auto-save-link post-processor. When
            `true` (default), URLs detected in chat prompts and replies
            are auto-captured to the vault and surfaced as `link_saved`
            SSE events.

    UpdatePrivacyRequest:
      type: object
      properties:
        privacyNoCNOrigin: { type: boolean }
        contextRouting: { type: boolean }
        autoSaveLinks:
          type: boolean
          description: HER-274 — opt out of the chat auto-save-link behavior.

    MeBillingResponse:
      type: object
      required: [tier, tierOverride, inTrial, daysRemaining, enforcementEnabled]
      properties:
        tier: { type: string, enum: [trial, pro, ultimate, lapsed, archived] }
        tierExpiresAt: { type: string, format: date-time }
        tierOverride: { type: string }
        inTrial: { type: boolean }
        daysRemaining: { type: integer }
        enforcementEnabled: { type: boolean }

    MeTodayResponse:
      type: object
      description: Widget + daily-review digest (HER-206).
      properties:
        date: { type: string, format: date }
        memories:
          type: array
          items: { $ref: '#/components/schemas/MemoryDTO' }
        achievements:
          type: array
          items: { $ref: '#/components/schemas/AchievementDTO' }
        soulExcerpt: { type: string }
        suggestedActions:
          type: array
          items: { type: string }

    # ── Dashboard (HER-244) ──

    # ── Skills (HER-247 / HER-177 / HER-178 / HER-179) ──

    SkillSource:
      type: string
      enum: [builtin, vault]

    SkillRunStatus:
      type: string
      enum: [pending, running, success, error]

    SkillCapability:
      type: string
      enum: [low, medium, high]

    APNSCategory:
      type: string
      enum: [chat, nudge, digest]

    SkillDTO:
      type: object
      required: [id, source, name, title, descriptionText, capability, enabled, dailyRunCount, dailyRunCap, bodyExcerpt]
      properties:
        id: { type: string }
        source: { $ref: '#/components/schemas/SkillSource' }
        name: { type: string }
        title: { type: string }
        descriptionText: { type: string }
        capability: { $ref: '#/components/schemas/SkillCapability' }
        schedule: { type: string }
        scheduleOverride: { type: string }
        enabled: { type: boolean }
        lastRunAt: { type: string, format: date-time }
        lastStatus: { $ref: '#/components/schemas/SkillRunStatus' }
        lastError: { type: string }
        dailyRunCount: { type: integer }
        dailyRunCap: { type: integer }
        apnsCategory: { $ref: '#/components/schemas/APNSCategory' }
        bodyExcerpt: { type: string }

    SkillListResponse:
      type: object
      required: [skills]
      properties:
        skills:
          type: array
          items: { $ref: '#/components/schemas/SkillDTO' }

    SkillRunDTO:
      type: object
      required: [id, startedAt, status]
      properties:
        id: { type: string, format: uuid }
        startedAt: { type: string, format: date-time }
        endedAt: { type: string, format: date-time }
        status: { $ref: '#/components/schemas/SkillRunStatus' }
        error: { type: string }
        modelUsed: { type: string }
        mtokIn: { type: integer }
        mtokOut: { type: integer }

    SkillSparklinePoint:
      type: object
      required: [day, count]
      properties:
        day: { type: string, format: date-time }
        count: { type: integer }

    SkillRunsResponse:
      type: object
      required: [runs, sparkline]
      properties:
        runs:
          type: array
          items: { $ref: '#/components/schemas/SkillRunDTO' }
        sparkline:
          type: array
          items: { $ref: '#/components/schemas/SkillSparklinePoint' }
        nextCursor: { type: string }

    SkillPatchRequest:
      type: object
      properties:
        enabled: { type: boolean }
        scheduleOverride: { type: string }
        apnsCategory: { $ref: '#/components/schemas/APNSCategory' }

    SkillOutputKind:
      type: string
      enum: [daily_brief, weekly_memo, correlation_insight, capture_enriched, pattern_finding, contradiction_finding, generic]

    SkillOutputDTO:
      type: object
      required: [id, skillName, source, kind, headline, body, createdAt]
      properties:
        id: { type: string, format: uuid }
        skillName: { type: string }
        source: { $ref: '#/components/schemas/SkillSource' }
        kind: { $ref: '#/components/schemas/SkillOutputKind' }
        headline: { type: string }
        body: { type: string }
        createdAt: { type: string, format: date-time }
        memoryID: { type: string, format: uuid }
        memoID: { type: string, format: uuid }
        vaultFilePath: { type: string }

    SkillOutputListResponse:
      type: object
      required: [outputs, streakDays, activeRun]
      properties:
        outputs:
          type: array
          items: { $ref: '#/components/schemas/SkillOutputDTO' }
        streakDays: { type: integer }
        activeRun: { type: boolean }
        nextCursor: { type: string }

    APNSCategoryPrefsResponse:
      type: object
      required: [chatEnabled, nudgeEnabled, digestEnabled]
      properties:
        chatEnabled: { type: boolean }
        nudgeEnabled: { type: boolean }
        digestEnabled: { type: boolean }

    APNSCategoryPrefsPutRequest:
      type: object
      properties:
        chatEnabled: { type: boolean }
        nudgeEnabled: { type: boolean }
        digestEnabled: { type: boolean }

    # ── Sessions (HER-245 / HER-259) ──

    SessionDTO:
      type: object
      required: [id, title, preview, messageCount, lastMessageAt, pinned, archived]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        preview: { type: string }
        messageCount: { type: integer }
        lastMessageAt: { type: string, format: date-time }
        workspaceID: { type: string, format: uuid }
        pinned: { type: boolean }
        archived: { type: boolean }

    SessionListResponse:
      type: object
      required: [sessions]
      properties:
        sessions:
          type: array
          items: { $ref: '#/components/schemas/SessionDTO' }
        nextCursor: { type: string }

    DashboardStatsResponse:
      type: object
      required: [memoriesToday, memoriesTotal]
      description: Aggregated counters for the OS Shell Home/Dashboard (HER-244).
      properties:
        memoriesToday: { type: integer, minimum: 0 }
        memoriesTotal: { type: integer, minimum: 0 }
        lastCompileAt:
          type: string
          format: date-time
          description: Most recent space compile timestamp; null if never compiled.

    DashboardProfileResponse:
      type: object
      required: [skillsCount, jobsCount, sessionsCount, badgesEarned, powerLevel, powerXP]
      description: Player-profile HUD counters for the Home dashboard.
      properties:
        skillsCount: { type: integer, minimum: 0, description: Enabled skills. }
        jobsCount: { type: integer, minimum: 0, description: Total skill runs. }
        sessionsCount: { type: integer, minimum: 0, description: Total conversations. }
        badgesEarned: { type: integer, minimum: 0, description: Unlocked sub-achievements. }
        powerLevel: { type: integer, minimum: 1, description: "Derived: floor(sqrt(powerXP)) + 1." }
        powerXP: { type: integer, minimum: 0, description: Raw weighted activity XP behind the level. }

    HomeSummaryResponse:
      type: object
      required: [skillsCount, jobsCount, remindersCount, todosCount, projectsCount, insightsCount]
      description: One-shot counts + active profile for the Home dashboard.
      properties:
        skillsCount: { type: integer, minimum: 0 }
        jobsCount: { type: integer, minimum: 0 }
        remindersCount: { type: integer, minimum: 0 }
        todosCount: { type: integer, minimum: 0 }
        projectsCount: { type: integer, minimum: 0 }
        insightsCount: { type: integer, minimum: 0 }
        activeProfileName: { type: string }
        activeProfileSlug: { type: string }

    UsageSummaryResponse:
      type: object
      required: [llmTokensIn, llmTokensOut, embeddingTokens, sessionsCount, estimatedCostCents, periodStart, periodEnd]
      description: Month-to-date usage analytics for the caller.
      properties:
        llmTokensIn: { type: integer, minimum: 0 }
        llmTokensOut: { type: integer, minimum: 0 }
        embeddingTokens: { type: integer, minimum: 0 }
        sessionsCount: { type: integer, minimum: 0 }
        estimatedCostCents: { type: integer, minimum: 0, description: Coarse blended estimate, not billing-accurate. }
        periodStart: { type: string, format: date-time }
        periodEnd: { type: string, format: date-time }

    TaskState:
      type: string
      enum: [running, queued, completed, failed]

    TaskDTO:
      type: object
      required: [id, kind, label, state]
      description: A long-running server-side operation (HER-244 / HER-246).
      properties:
        id: { type: string, format: uuid }
        kind:
          type: string
          description: Stable identifier for the kind of work (e.g. "kb-compile").
        label:
          type: string
          description: Human-readable label rendered in the iOS Tasks card.
        state: { $ref: '#/components/schemas/TaskState' }
        progress:
          type: number
          format: double
          minimum: 0
          maximum: 1
        startedAt: { type: string, format: date-time }
        elapsedSeconds: { type: integer, minimum: 0 }
        error: { type: string }

    TaskListResponse:
      type: object
      required: [tasks]
      properties:
        tasks:
          type: array
          items: { $ref: '#/components/schemas/TaskDTO' }
        nextCursor: { type: string }

    InsightSection:
      type: string
      enum: [this_week, this_month, patterns, contradictions, connections]

    InsightDTO:
      type: object
      required: [id, headline, summary, section, createdAt]
      description: |
        A proactive finding surfaced by Hermes (HER-244 / HER-248 / HER-37).
        For `this_week` / `this_month` synthesis rows the `periodStart` /
        `periodEnd` fields demarcate the analytical window. Pattern rows
        leave both nil.
      properties:
        id: { type: string, format: uuid }
        headline: { type: string }
        summary: { type: string }
        section: { $ref: '#/components/schemas/InsightSection' }
        createdAt: { type: string, format: date-time }
        sourceMemoryIDs:
          type: array
          items: { type: string, format: uuid }
        dismissed: { type: boolean, default: false }
        periodStart: { type: string, format: date-time }
        periodEnd: { type: string, format: date-time }

    InsightListResponse:
      type: object
      required: [insights]
      properties:
        insights:
          type: array
          items: { $ref: '#/components/schemas/InsightDTO' }
        nextCursor: { type: string }

    # ── Reminders (HER-Reminders) ──

    ReminderDTO:
      type: object
      required: [id, title, body, fireAt, createdAt]
      description: |
        A user-scheduled timed message. When `fireAt` arrives the server
        fires an APNS push (category `reminder`) and stamps `firedAt`.
        One-shot unless `recurrenceCron` is set.
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        body: { type: string }
        fireAt: { type: string, format: date-time }
        recurrenceCron: { type: string }
        firedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }

    ReminderListResponse:
      type: object
      required: [reminders]
      properties:
        reminders:
          type: array
          items: { $ref: '#/components/schemas/ReminderDTO' }
        nextCursor: { type: string }

    ReminderCreateRequest:
      type: object
      required: [title, body, fireAt]
      properties:
        title: { type: string }
        body: { type: string }
        fireAt: { type: string, format: date-time }
        recurrenceCron: { type: string }

    ReminderPatchRequest:
      type: object
      properties:
        title: { type: string }
        body: { type: string }
        fireAt: { type: string, format: date-time }
        recurrenceCron: { type: string }

    # ── Projects (HER-Projects) ──

    ProjectDTO:
      type: object
      required: [id, name, archived, createdAt]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        archived: { type: boolean, default: false }
        todoCount: { type: integer }
        createdAt: { type: string, format: date-time }

    ProjectListResponse:
      type: object
      required: [projects]
      properties:
        projects:
          type: array
          items: { $ref: '#/components/schemas/ProjectDTO' }
        nextCursor: { type: string }

    ProjectCreateRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        description: { type: string }

    ProjectPatchRequest:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        archived: { type: boolean }

    # ── Todos (HER-Notes/Todos merge — note-backed) ──

    TodoDTO:
      type: object
      required: [id, title, done, createdAt]
      description: A user to-do. Backed by a vault note (`metadata.isTodo`).
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        done: { type: boolean, default: false }
        dueAt: { type: string, format: date-time }
        projectID: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }

    TodoListResponse:
      type: object
      required: [todos]
      properties:
        todos:
          type: array
          items: { $ref: '#/components/schemas/TodoDTO' }
        nextCursor: { type: string }

    TodoCreateRequest:
      type: object
      required: [title]
      properties:
        title: { type: string }
        dueAt: { type: string, format: date-time }
        projectID: { type: string, format: uuid }

    TodoPatchRequest:
      type: object
      properties:
        title: { type: string }
        done: { type: boolean }
        dueAt: { type: string, format: date-time }
        projectID: { type: string, format: uuid }

    # ── BYO Hermes ──

    HermesConfigGetResponse:
      type: object
      required: [baseUrl, hasAuthHeader]
      properties:
        baseUrl: { type: string, format: uri }
        hasAuthHeader: { type: boolean }
        verifiedAt: { type: string, format: date-time }

    HermesConfigPutRequest:
      type: object
      required: [baseUrl]
      properties:
        baseUrl: { type: string, format: uri }
        authHeader:
          type: string
          description: Full Authorization header value (e.g. `Bearer xyz`).

    HermesConfigTestResponse:
      type: object
      required: [verifiedAt]
      properties:
        verifiedAt: { type: string, format: date-time }

    # ── Provider credentials + LLM preferences (HER-252) ──

    ProviderID:
      type: string
      enum: [xai, anthropic, openai, ollama, openRouter]
      description: |
        Wire identifier for an external LLM provider the user can attach
        credentials to. `hermesGateway` is intentionally excluded — it's
        deployment infrastructure, not user-credential surface.

    ProviderCredentialKind:
      type: string
      enum: [apiKey, oauth, hostURL]

    ProviderCredentialDTO:
      type: object
      required: [provider, kind, hasCredential]
      properties:
        provider: { $ref: '#/components/schemas/ProviderID' }
        kind: { $ref: '#/components/schemas/ProviderCredentialKind' }
        hasCredential: { type: boolean }
        baseUrl: { type: string, format: uri }
        label: { type: string }
        verifiedAt: { type: string, format: date-time }
        lastFailureAt: { type: string, format: date-time }
        lastFailureCode:
          type: string
          description: |
            Stable code from the last failed /test or runtime failover:
            `credit_exhausted` / `rate_limit` / `upstream_error` /
            `upstream_rejected` / `network` / `tls_error` / `timeout`.

    ProviderCredentialsListResponse:
      type: object
      required: [providers]
      properties:
        providers:
          type: array
          items: { $ref: '#/components/schemas/ProviderCredentialDTO' }

    ProviderCredentialPutRequest:
      type: object
      required: [kind]
      properties:
        kind: { $ref: '#/components/schemas/ProviderCredentialKind' }
        apiKey: { type: string }
        baseUrl: { type: string, format: uri }
        label: { type: string }

    ProviderTestResponse:
      type: object
      required: [verifiedAt]
      properties:
        verifiedAt: { type: string, format: date-time }
        model: { type: string }

    # ─── Hermes Gateways (HER-241) ──────────────────────────────────────

    HermesGatewayID:
      type: string
      enum: [telegram, discord, slack, whatsapp]
      description: |
        Identifier for a Hermes messaging gateway the user can configure.
        Today this is the MVP four; the broader Hermes list (Matrix,
        Signal, Email, SMS, …) lands in follow-up tickets.

    HermesGatewayStatus:
      type: string
      enum: [not_configured, configured, verified, error]
      description: |
        Lifecycle of a per-user gateway. `not_configured` means no row.
        `configured` is the terminal state today — Hermes exposes no
        HTTP API to confirm a gateway is actually live, so we cannot
        promote past `configured` until upstream ships introspection.

    HermesGatewayFieldKind:
      type: string
      enum: [text, secret, url]

    HermesGatewayField:
      type: object
      required: [key, label, kind, isRequired]
      properties:
        key: { type: string }
        label: { type: string }
        placeholder: { type: string }
        kind: { $ref: '#/components/schemas/HermesGatewayFieldKind' }
        isRequired: { type: boolean }

    HermesGatewayCatalogEntry:
      type: object
      required: [id, displayName, iconSlug, description, requiredFields, status, hasConfig]
      properties:
        id: { $ref: '#/components/schemas/HermesGatewayID' }
        displayName: { type: string }
        iconSlug: { type: string }
        description: { type: string }
        requiredFields:
          type: array
          items: { $ref: '#/components/schemas/HermesGatewayField' }
        status: { $ref: '#/components/schemas/HermesGatewayStatus' }
        hasConfig: { type: boolean }
        verifiedAt: { type: string, format: date-time }
        lastFailureCode:
          type: string
          description: |
            Stable code from the last failed /test probe:
            `hermes_unauthorized` / `hermes_unreachable:<reason>`.

    HermesGatewaysListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/HermesGatewayCatalogEntry' }

    HermesGatewayPutRequest:
      type: object
      required: [config]
      properties:
        config:
          type: object
          additionalProperties: { type: string }
          description: |
            Map of gateway field key → value. Required fields per
            gateway are advertised in the catalog entry's
            `requiredFields`. Secrets are sealed via SecretBox at rest
            and never echoed back.

    HermesGatewayTestResponse:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }
        verifiedAt: { type: string, format: date-time }
        errorCode: { type: string }
        errorMessage: { type: string }

    # ─── Hermes Profiles (HER-273) ──────────────────────────────────

    HermesProfileDTO:
      type: object
      required: [id, slug, label, systemPrompt, isDefault, skillsEnabled, createdAt, updatedAt]
      properties:
        id: { type: string, format: uuid }
        slug: { type: string, pattern: '^[a-z0-9][a-z0-9-]{0,31}$' }
        label: { type: string, minLength: 1, maxLength: 80 }
        systemPrompt: { type: string }
        isDefault: { type: boolean }
        skillsEnabled:
          type: array
          items: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    HermesProfilesListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/HermesProfileDTO' }
        activeSlug:
          type: string
          description: Slug of the persona currently flagged as the tenant default.

    HermesProfileCreateRequest:
      type: object
      required: [slug, label]
      properties:
        slug: { type: string, pattern: '^[a-z0-9][a-z0-9-]{0,31}$' }
        label: { type: string, minLength: 1, maxLength: 80 }
        systemPrompt: { type: string }
        templateSlug:
          type: string
          description: |
            Optional preset SOUL template slug. Wins over `systemPrompt`
            when both are set. Catalogue: `personal-assistant`,
            `stocks-tracker`, `news-curator`, `tv-and-movies`,
            `tech-and-programming`. Replaced by HER-273-B5 once
            `/v1/soul/templates` ships.
        skillsEnabled:
          type: array
          items: { type: string }

    HermesProfilePatchRequest:
      type: object
      properties:
        label: { type: string, minLength: 1, maxLength: 80 }
        systemPrompt: { type: string }
        skillsEnabled:
          type: array
          items: { type: string }

    HermesProfileActivateResponse:
      type: object
      required: [slug, activatedAt]
      properties:
        slug: { type: string }
        activatedAt: { type: string, format: date-time }

    ModelRouteDTO:
      type: object
      required: [provider, model]
      properties:
        provider: { $ref: '#/components/schemas/ProviderID' }
        model: { type: string }

    LLMBrainMode:
      type: string
      enum: [managed, byok]
      description: |
        HER-300 — `managed` ⇒ server-funded default routing (Hermes
        gateway + LuminaVault-provided keys). `byok` ⇒ user-supplied
        provider credentials drive the routing primary + fallback chain.

    LLMPreferencesGetResponse:
      type: object
      required: [primaryProvider, primaryModel, fallbackChain]
      properties:
        mode:
          $ref: '#/components/schemas/LLMBrainMode'
          description: |
            Defaults to `managed` when omitted (legacy server payload).
        primaryProvider: { $ref: '#/components/schemas/ProviderID' }
        primaryModel: { type: string }
        fallbackChain:
          type: array
          items: { $ref: '#/components/schemas/ModelRouteDTO' }

    LLMPreferencesPutRequest:
      type: object
      required: [primaryProvider, primaryModel, fallbackChain]
      properties:
        mode:
          $ref: '#/components/schemas/LLMBrainMode'
          description: |
            Defaults to `managed` when omitted.
        primaryProvider: { $ref: '#/components/schemas/ProviderID' }
        primaryModel: { type: string }
        fallbackChain:
          type: array
          items: { $ref: '#/components/schemas/ModelRouteDTO' }

    ProviderFallbackNoticeDTO:
      type: object
      required: [originalProvider, originalModel, fallbackProvider, fallbackModel, reasonCode, userMessage]
      description: |
        Payload of the `fallback` SSE event emitted by streaming chat /
        query endpoints when RoutedLLMTransport advances candidates on a
        recoverable failure. Clients render `userMessage` verbatim as a
        banner.
      properties:
        originalProvider: { $ref: '#/components/schemas/ProviderID' }
        originalModel: { type: string }
        fallbackProvider: { $ref: '#/components/schemas/ProviderID' }
        fallbackModel: { type: string }
        reasonCode:
          type: string
          description: |
            `credit_exhausted` / `rate_limit` / `upstream_error` /
            `network` / `upstream_rejected`.
        userMessage: { type: string }

    # ── Onboarding ──

    OnboardingStateDTO:
      type: object
      properties:
        signupCompleted: { type: boolean }
        signupCompletedAt: { type: string, format: date-time }
        emailVerifiedCompleted: { type: boolean }
        emailVerifiedCompletedAt: { type: string, format: date-time }
        soulConfiguredCompleted: { type: boolean }
        soulConfiguredCompletedAt: { type: string, format: date-time }
        firstCaptureCompleted: { type: boolean }
        firstCaptureCompletedAt: { type: string, format: date-time }
        firstKBCompileCompleted: { type: boolean }
        firstKBCompileCompletedAt: { type: string, format: date-time }
        firstQueryCompleted: { type: boolean }
        firstQueryCompletedAt: { type: string, format: date-time }
        brainConfiguredCompleted:
          type: boolean
          description: HER-300 — true once user completes "Choose Your Brain".
        brainConfiguredCompletedAt: { type: string, format: date-time }

    OnboardingPatchRequest:
      type: object
      description: |
        All fields optional. Only `true` is accepted — `false` rejected
        with 400 because the flags are one-way latches.
      properties:
        signupCompleted: { type: boolean }
        emailVerifiedCompleted: { type: boolean }
        soulConfiguredCompleted: { type: boolean }
        firstCaptureCompleted: { type: boolean }
        firstKBCompileCompleted: { type: boolean }
        firstQueryCompleted: { type: boolean }
        brainConfiguredCompleted: { type: boolean }

    # ── Devices ──

    DeviceRegistrationRequest:
      type: object
      required: [token, platform]
      properties:
        token: { type: string }
        platform: { type: string, enum: [ios, android] }

    DeviceRegistrationResponse:
      type: object
      required: [id, token, platform]
      properties:
        id: { type: string, format: uuid }
        token: { type: string }
        platform: { type: string }

    # ── Account ──

    AccountDeleteRequest:
      type: object
      properties:
        password:
          type: string
          description: Optional re-auth; bypassed for OAuth-only accounts.

    # ── Billing ──

    RevenueCatWebhookBody:
      type: object
      description: Opaque RevenueCat event envelope; forwarded verbatim.
      additionalProperties: true

    # ── LLM / Chat ──

    ChatRequest:
      type: object
      required: [messages]
      properties:
        model: { type: string }
        messages:
          type: array
          items: { $ref: '#/components/schemas/ChatMessage' }
        temperature: { type: number, minimum: 0, maximum: 2 }
        stream: { type: boolean, default: false }

    ChatMessage:
      type: object
      required: [role, content]
      properties:
        role: { type: string, enum: [system, user, assistant, tool] }
        content: { type: string }
        toolCalls:
          type: array
          items: { type: object, additionalProperties: true }

    ChatResponse:
      type: object
      required: [id, choices]
      properties:
        id: { type: string }
        model: { type: string }
        choices:
          type: array
          items: { $ref: '#/components/schemas/ChatChoice' }
        usage: { $ref: '#/components/schemas/ChatUsage' }

    ChatChoice:
      type: object
      required: [index, message]
      properties:
        index: { type: integer }
        message: { $ref: '#/components/schemas/ChatMessage' }
        finishReason: { type: string }

    ChatUsage:
      type: object
      properties:
        promptTokens: { type: integer }
        completionTokens: { type: integer }
        totalTokens: { type: integer }

    # ── Transcribe (HER-203) ──

    TranscribeMultipartRequest:
      type: object
      required: [audio]
      properties:
        audio:
          type: string
          format: binary
        model: { type: string }
        language: { type: string }

    TranscribeResponse:
      type: object
      required: [text]
      properties:
        text: { type: string }
        durationSec: { type: number }

    # ── TTS (HER-204) ──

    TTSRequest:
      type: object
      required: [text]
      properties:
        text: { type: string }
        voice: { type: string }
        model: { type: string }
        format: { type: string, enum: [mp3], default: mp3 }

    # ── Vision embed (HER-205) ──

    VisionEmbedRequest:
      type: object
      required: [image]
      properties:
        image:
          type: string
          format: byte
          description: Base64-encoded image bytes.
        mimeType:
          type: string
          enum: [image/png, image/jpeg, image/webp]
        model: { type: string }

    VisionEmbedResponse:
      type: object
      required: [embedding]
      properties:
        embedding:
          type: array
          items: { type: number }

    # ── Memory ──

    MemoryDTO:
      type: object
      required: [id, content, reviewState]
      properties:
        id: { type: string, format: uuid }
        content: { type: string }
        tags:
          type: array
          items: { type: string }
        score: { type: number }
        accessCount: { type: integer }
        queryHitCount: { type: integer }
        lastAccessedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        sourceVaultFileId: { type: string, format: uuid }
        reviewState:
          type: string
          enum: [auto, pending, approved, rejected]
          description: |
            HER-290 — moderation state. `auto` for manual upserts + backfill;
            `pending` for kb-compile-produced memories awaiting approve/reject;
            `approved` / `rejected` after the user acts. Reject also lands the
            content hash on the per-tenant `kb_compile_reject_list` so future
            compile runs skip the same content.

    MemoryListResponse:
      type: object
      required: [memories]
      properties:
        memories:
          type: array
          items: { $ref: '#/components/schemas/MemoryDTO' }
        limit: { type: integer }
        offset: { type: integer }

    MemoryUpsertRequest:
      type: object
      required: [content]
      properties:
        content: { type: string }
        tags:
          type: array
          items: { type: string }
        sourceVaultFileId: { type: string, format: uuid }

    MemorySearchRequest:
      type: object
      required: [query]
      properties:
        query: { type: string }
        limit: { type: integer, default: 20 }
        filters:
          type: object
          additionalProperties: true

    MemorySearchResponse:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items: { $ref: '#/components/schemas/MemorySearchResult' }

    MemorySearchResult:
      type: object
      required: [memory, score]
      properties:
        memory: { $ref: '#/components/schemas/MemoryDTO' }
        score: { type: number }

    MemoryPatchRequest:
      type: object
      properties:
        content: { type: string }
        tags:
          type: array
          items: { type: string }
        reviewState:
          type: string
          enum: [approved, rejected]
          description: |
            HER-290 — only `pending → approved` and `pending → rejected`
            transitions are legal. Other source/target combinations return
            422. On `rejected` the server records the source + content_hash
            so future kb-compile runs skip the same content.

    MemoryLineageResponse:
      type: object
      properties:
        memory: { $ref: '#/components/schemas/MemoryDTO' }
        vaultFile: { $ref: '#/components/schemas/VaultFileDTO' }
        ancestors:
          type: array
          items: { $ref: '#/components/schemas/MemoryDTO' }

    # ── Memory Graph (HER-235) ──

    MemoryGraphNodeDTO:
      type: object
      required: [id, title, tags, createdAt, score]
      properties:
        id: { type: string, format: uuid }
        title: { type: string, description: "First ~60 chars of memory content; used as node label." }
        tags:
          type: array
          items: { type: string }
        createdAt: { type: string, format: date-time }
        score: { type: number, format: double, description: "Existing memories.score — drives node radius client-side." }

    MemoryEdgeKindDTO:
      type: string
      enum: [tag, semantic]

    MemoryGraphEdgeDTO:
      type: object
      required: [from, to, kind, weight]
      properties:
        from: { type: string, format: uuid }
        to: { type: string, format: uuid }
        kind: { $ref: '#/components/schemas/MemoryEdgeKindDTO' }
        tag:
          type: string
          description: "Populated when kind == tag: the shared tag that produced the edge."
        similarity:
          type: number
          format: double
          minimum: 0.0
          maximum: 1.0
          description: "Populated when kind == semantic: cosine similarity in [0, 1]."
        weight:
          type: number
          format: double
          minimum: 0.0
          maximum: 1.0
          description: "Normalised edge strength used for visual alpha/thickness."

    MemoryGraphResponse:
      type: object
      required: [nodes, edges, generatedAt]
      properties:
        nodes:
          type: array
          items: { $ref: '#/components/schemas/MemoryGraphNodeDTO' }
        edges:
          type: array
          items: { $ref: '#/components/schemas/MemoryGraphEdgeDTO' }
        generatedAt: { type: string, format: date-time }

    # ── Capture / URL Enrichment ──

    CaptureSafariRequest:
      type: object
      required: [url]
      properties:
        url: { type: string, format: uri }
        notes: { type: string }
        spaceId: { type: string, format: uuid }

    CaptureSafariResponse:
      type: object
      required: [vaultFileId]
      properties:
        vaultFileId: { type: string, format: uuid }
        enrichmentStatus: { type: string, enum: [pending, complete, failed] }

    # ── Query ──

    QueryRequest:
      type: object
      required: [query]
      properties:
        query: { type: string }
        limit: { type: integer, default: 10 }

    QueryHitDTO:
      type: object
      required: [id, content, distance]
      description: A single retrieved memory snippet returned by `/v1/query`.
      properties:
        id: { type: string, format: uuid }
        content: { type: string }
        distance: { type: number, format: float }
        createdAt: { type: string, format: date-time }

    QueryResponse:
      type: object
      required: [summary, hits]
      description: |
        Non-streaming response for `POST /v1/query`. The streaming variant
        emits `QueryStreamEvent` over SSE — see `/v1/query/stream`.
        `followUps` is server-generated and optional for backward
        compatibility with pre-HER-37 clients.
      properties:
        summary: { type: string }
        hits:
          type: array
          items: { $ref: '#/components/schemas/QueryHitDTO' }
        followUps:
          type: array
          items: { type: string }

    QueryStreamEvent:
      type: object
      required: [type]
      description: |
        Discriminated-union event emitted on `POST /v1/query/stream` and
        `POST /v1/conversations/{id}/messages/stream` Server-Sent-Event
        streams. Each SSE `data:` line carries one JSON object of this
        shape. The `payload` shape depends on `type`:

        - `source` — `QueryHitDTO`
        - `token` — `string` (incremental LLM delta, concatenate in order)
        - `summary` — `string` (final summary, sent after all tokens)
        - `follow_ups` — `array<string>` (server-generated follow-up chips)
        - `done` — no payload (stream terminator)
        - `error` — `string` (stream-level error; client surfaces and aborts)
        - `fallback` — `ProviderFallbackNoticeDTO` (HER-252 routing failover)
        - `link_saved` — `LinkSavedDTO` (HER-274 auto-saved chat link)
      properties:
        type:
          type: string
          enum: [source, token, summary, follow_ups, done, error, fallback, link_saved]
        payload:
          description: Case-specific payload; absent for `done`.

    LinkSavedDTO:
      type: object
      required: [url, vaultPath, capturedAt, fromUserMessage]
      description: |
        HER-274 — payload of the `link_saved` SSE event. One emitted per
        unique URL the server auto-captured to the vault while processing
        a chat turn, after tokens and before `.done`.
      properties:
        url: { type: string, format: uri }
        vaultPath:
          type: string
          description: Tenant-relative vault path (e.g. `captures/2026-05-24-103045-news-ycombinator-com.md`).
        capturedAt: { type: string, format: date-time }
        fromUserMessage:
          type: boolean
          description: |
            `true` when the URL appeared in the user prompt; `false` when
            it appeared only in the assistant reply. Drives client toast
            copy variant.

    # ── Conversations (HER-37 multi-turn chat) ──

    ConversationMessageRole:
      type: string
      enum: [user, assistant, system]

    ConversationDTO:
      type: object
      required: [id, title, createdAt, updatedAt]
      description: |
        A persisted multi-turn chat thread. Backs the "thinking workspace"
        continuity surface on the Think tab.
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        spaceId: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ConversationMessageDTO:
      type: object
      required: [id, conversationId, role, content, createdAt]
      description: |
        A single persisted turn within a Conversation. Durable record;
        distinct from the transient `ChatMessage` used on the Hermes
        upstream wire.
      properties:
        id: { type: string, format: uuid }
        conversationId: { type: string, format: uuid }
        role: { $ref: '#/components/schemas/ConversationMessageRole' }
        content: { type: string }
        sourceMemoryIDs:
          type: array
          items: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }

    ConversationCreateRequest:
      type: object
      properties:
        title: { type: string }
        spaceId: { type: string, format: uuid }

    ConversationListResponse:
      type: object
      required: [conversations]
      properties:
        conversations:
          type: array
          items: { $ref: '#/components/schemas/ConversationDTO' }
        nextCursor: { type: string }

    ConversationDetailResponse:
      type: object
      required: [conversation, messages]
      properties:
        conversation: { $ref: '#/components/schemas/ConversationDTO' }
        messages:
          type: array
          items: { $ref: '#/components/schemas/ConversationMessageDTO' }

    MessageStreamRequest:
      type: object
      required: [content]
      properties:
        content: { type: string }

    # ── Memos ──

    MemoGenerateRequest:
      type: object
      required: [topic]
      properties:
        topic: { type: string }
        depth: { type: string, enum: [quick, deep] }

    MemoGenerateResponse:
      type: object
      required: [vaultFileId, markdown]
      properties:
        vaultFileId: { type: string, format: uuid }
        markdown: { type: string }

    MemoSummaryDTO:
      type: object
      required: [id, title, path, createdAt]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        path: { type: string }
        createdAt: { type: string, format: date-time }
        summary: { type: string }

    MemoListResponse:
      type: object
      required: [memos]
      properties:
        memos:
          type: array
          items: { $ref: '#/components/schemas/MemoSummaryDTO' }

    SuggestionsResponse:
      type: object
      required: [suggestions]
      properties:
        suggestions:
          type: array
          items: { type: string }

    # ── Vault ──

    VaultFileDTO:
      type: object
      required: [id, path, contentType, sizeBytes]
      properties:
        id: { type: string, format: uuid }
        path: { type: string }
        contentType: { type: string }
        sizeBytes: { type: integer }
        sha256: { type: string }
        processedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        metadata:
          type: object
          additionalProperties: true

    VaultListResponse:
      type: object
      required: [files]
      properties:
        files:
          type: array
          items: { $ref: '#/components/schemas/VaultFileDTO' }

    VaultUploadResponse:
      type: object
      required: [path, size, contentType, sha256]
      properties:
        path: { type: string }
        size: { type: integer }
        contentType: { type: string }
        sha256: { type: string }

    VaultMoveRequest:
      type: object
      required: [from, to]
      properties:
        from: { type: string }
        to: { type: string }

    # ── KB ──

    KBCompileRequest:
      type: object
      properties:
        vaultFileIds:
          type: array
          items: { type: string, format: uuid }
        forceFullRecompile: { type: boolean, default: false }

    KBCompileResponse:
      type: object
      required: [memoriesIngested, runId, pendingMemoryIds]
      properties:
        memoriesIngested: { type: integer }
        memoriesUpdated: { type: integer }
        durationMs: { type: integer }
        runId:
          type: string
          format: uuid
          description: |
            HER-288 — UUID correlation handle. Same value appears in every
            kb-compile WS progress event (`KBCompileProgressEvent`) emitted
            during this run.
        pendingMemoryIds:
          type: array
          items: { type: string, format: uuid }
          description: |
            HER-290 — IDs of the freshly-saved memories this run produced
            that are now awaiting approve/reject. Empty when the compile
            short-circuited (no pending vault files) or when the agent
            decided nothing was worth persisting.

    KBCompilePendingResponse:
      type: object
      required: [pendingFiles]
      properties:
        pendingFiles:
          type: integer
          description: HER-293 — vault rows with `processed_at` IS NULL for the caller's tenant.

    ImportCreateRequest:
      type: object
      required: [sourceType, urls]
      properties:
        sourceType: { type: string, example: bookmarks }
        urls:
          type: array
          items: { type: string, format: uri }
    ImportFilesRequest:
      type: object
      required: [sourceType, vaultFileIds]
      properties:
        sourceType: { type: string, example: documents }
        vaultFileIds:
          type: array
          items: { type: string, format: uuid }
    ImportCreateResponse:
      type: object
      required: [sessionId, status, total, staged, skipped]
      properties:
        sessionId: { type: string, format: uuid }
        status: { type: string }
        total: { type: integer }
        staged: { type: integer }
        skipped: { type: integer }
    ImportItemDTO:
      type: object
      required: [id, status]
      properties:
        id: { type: string, format: uuid }
        url: { type: string, nullable: true }
        title: { type: string, nullable: true }
        proposedSpace:
          type: string
          nullable: true
          description: existing Space slug, `new:<Name>`, or `imported`.
        status: { type: string }
    ImportStatusResponse:
      type: object
      required: [id, sourceType, status, total, staged, items]
      properties:
        id: { type: string, format: uuid }
        sourceType: { type: string }
        status: { type: string }
        total: { type: integer }
        staged: { type: integer }
        items:
          type: array
          items: { $ref: '#/components/schemas/ImportItemDTO' }
    ImportApproveRequest:
      type: object
      properties:
        overrides:
          type: object
          nullable: true
          additionalProperties: { type: string }
          description: itemId → `slug | new:Name | imported`. Absent items keep their proposal.
    ImportApproveResponse:
      type: object
      required: [sessionId, status, filed, memoriesIngested]
      properties:
        sessionId: { type: string, format: uuid }
        status: { type: string }
        filed: { type: integer }
        memoriesIngested: { type: integer }

    PluginConfigField:
      type: object
      required: [key, label, kind, isRequired]
      properties:
        key: { type: string }
        label: { type: string }
        placeholder: { type: string, nullable: true }
        kind: { type: string, enum: [text, secret, url] }
        isRequired: { type: boolean }
    PluginCatalogEntryDTO:
      type: object
      required: [slug, name, summary, description, category, capabilityKind, iconSlug, version, publisher, verified, configFields]
      properties:
        slug: { type: string }
        name: { type: string }
        summary: { type: string }
        description: { type: string }
        category: { type: string, enum: [connector, skill, memory, export, ui, theme] }
        capabilityKind: { type: string, enum: [connector, skill, memory] }
        iconSlug: { type: string }
        version: { type: string }
        publisher: { type: string }
        verified: { type: boolean }
        configFields:
          type: array
          items: { $ref: '#/components/schemas/PluginConfigField' }
    PluginCatalogListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/PluginCatalogEntryDTO' }
    PluginInstallDTO:
      type: object
      required: [id, pluginSlug, status, hasConfig]
      properties:
        id: { type: string, format: uuid }
        pluginSlug: { type: string }
        status: { type: string, enum: [enabled, disabled] }
        hasConfig: { type: boolean }
        createdAt: { type: string, format: date-time, nullable: true }
        lastSyncAt: { type: string, format: date-time, nullable: true }
    PluginInstallsListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/PluginInstallDTO' }
    InstallPluginRequest:
      type: object
      required: [pluginSlug, config]
      properties:
        pluginSlug: { type: string }
        config:
          type: object
          additionalProperties: { type: string }
          description: field key → value, validated against the catalog entry.
    UpdatePluginInstallRequest:
      type: object
      properties:
        config:
          type: object
          nullable: true
          additionalProperties: { type: string }
        status: { type: string, enum: [enabled, disabled], nullable: true }
    PluginSyncResponse:
      type: object
      required: [installId, sessionId, status, total, staged, skipped]
      properties:
        installId: { type: string, format: uuid }
        sessionId: { type: string, format: uuid }
        status: { type: string }
        total: { type: integer }
        staged: { type: integer }
        skipped: { type: integer }

    KBCompileStartedDTO:
      type: object
      required: [runId, totalFiles]
      properties:
        runId: { type: string, format: uuid }
        totalFiles: { type: integer }

    KBCompilePreparingDTO:
      type: object
      required: [runId]
      properties:
        runId: { type: string, format: uuid }

    KBCompileThinkingDTO:
      type: object
      required: [runId, iteration]
      properties:
        runId: { type: string, format: uuid }
        iteration: { type: integer, minimum: 1 }

    KBCompileMemorySavedDTO:
      type: object
      required: [runId, memory]
      properties:
        runId: { type: string, format: uuid }
        memory: { $ref: '#/components/schemas/MemoryDTO' }

    KBCompileCompletedDTO:
      type: object
      required: [runId, response]
      properties:
        runId: { type: string, format: uuid }
        response: { $ref: '#/components/schemas/KBCompileResponse' }

    KBCompileErrorDTO:
      type: object
      required: [runId, message]
      properties:
        runId: { type: string, format: uuid }
        message: { type: string }

    KBCompileProgressEvent:
      type: object
      description: |
        HER-288 — message sent over `/v1/ws` while a kb-compile run is in
        flight. WebSocket messages aren't formalized in OpenAPI 3.0; this
        component exists for client codegen + contract documentation.
        Server emits one started, one preparing, one or more thinking,
        zero or more memorySaved, then exactly one completed or error.
      required: [type, payload]
      properties:
        type:
          type: string
          enum: [started, preparing, thinking, memorySaved, completed, error]
        payload:
          description: |
            Shape depends on `type` — refer to the corresponding `KBCompile*DTO`.
          oneOf:
            - $ref: '#/components/schemas/KBCompileStartedDTO'
            - $ref: '#/components/schemas/KBCompilePreparingDTO'
            - $ref: '#/components/schemas/KBCompileThinkingDTO'
            - $ref: '#/components/schemas/KBCompileMemorySavedDTO'
            - $ref: '#/components/schemas/KBCompileCompletedDTO'
            - $ref: '#/components/schemas/KBCompileErrorDTO'

    # ── Spaces ──

    SpaceDTO:
      type: object
      required: [id, name, slug, noteCount]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        color: { type: string }
        icon: { type: string }
        category:
          type: string
          description: HER-35 — free-form bucket label (e.g. "ai", "stocks") rendered as a segmented chip on the client.
        noteCount:
          type: integer
          description: HER-35 — denormalized memo count for the Space card. Default 0; updated by the ingest path.
        lastCompiledAt:
          type: string
          format: date-time
          description: HER-35 — timestamp of the last KB compile that included this Space; null if never compiled.
        createdAt: { type: string, format: date-time }

    SpaceListResponse:
      type: object
      required: [spaces]
      properties:
        spaces:
          type: array
          items: { $ref: '#/components/schemas/SpaceDTO' }

    SpaceCreateRequest:
      type: object
      required: [name]
      properties:
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        color: { type: string }
        icon: { type: string }
        category: { type: string }

    SpaceUpdateRequest:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        color: { type: string }
        icon: { type: string }
        category: { type: string }

    # ── Vault Init (HER-35) ──

    VaultCreateRequest:
      type: object
      description: HER-35 — `POST /v1/vault/create` has no body. Defined as an empty schema so generated clients keep a typed Encodable.
      properties: {}

    VaultStatusResponse:
      type: object
      required: [initialized, defaultSpaceSlugs]
      properties:
        initialized:
          type: boolean
          description: True once the tenant has run `POST /v1/vault/create`.
        createdAt:
          type: string
          format: date-time
        defaultSpaceSlugs:
          type: array
          items: { type: string }
          description: Slugs of Spaces seeded on first vault create.

    # ── Soul ──

    SoulResponse:
      type: object
      required: [markdown]
      properties:
        markdown: { type: string }
        updatedAt: { type: string, format: date-time }

    SoulPutRequest:
      type: object
      required: [markdown]
      properties:
        markdown: { type: string }

    # ── Achievements ──

    AchievementDTO:
      type: object
      required: [key, title]
      properties:
        key: { type: string }
        title: { type: string }
        description: { type: string }
        tier: { type: string }
        progressCount: { type: integer }
        targetCount: { type: integer }
        unlockedAt: { type: string, format: date-time }

    AchievementsListResponse:
      type: object
      required: [achievements]
      properties:
        achievements:
          type: array
          items: { $ref: '#/components/schemas/AchievementDTO' }

    AchievementsRecentResponse:
      type: object
      required: [unlocks]
      properties:
        unlocks:
          type: array
          items: { $ref: '#/components/schemas/AchievementDTO' }

    # ── Health ──

    HealthEventDTO:
      type: object
      required: [id, eventType, recordedAt]
      properties:
        id: { type: string, format: uuid }
        eventType: { type: string }
        valueNumeric: { type: number }
        valueText: { type: string }
        unit: { type: string }
        recordedAt: { type: string, format: date-time }
        source: { type: string }
        metadata:
          type: object
          additionalProperties: true

    HealthIngestRequest:
      type: object
      required: [events]
      properties:
        events:
          type: array
          items: { $ref: '#/components/schemas/HealthEventInput' }

    HealthEventInput:
      type: object
      required: [eventType, recordedAt]
      properties:
        eventType: { type: string }
        valueNumeric: { type: number }
        valueText: { type: string }
        unit: { type: string }
        recordedAt: { type: string, format: date-time }
        source: { type: string }
        metadata:
          type: object
          additionalProperties: true

    HealthIngestResponse:
      type: object
      required: [ingested]
      properties:
        ingested: { type: integer }

    HealthListResponse:
      type: object
      required: [events, limit, offset]
      properties:
        events:
          type: array
          items: { $ref: '#/components/schemas/HealthEventDTO' }
        limit: { type: integer }
        offset: { type: integer }

    HealthDayAggregateDTO:
      type: object
      required: [date, type, value, sampleCount]
      properties:
        date:
          type: string
          format: date-time
          description: Start of the day in UTC.
        type: { type: string }
        value:
          type: number
          format: double
          description: Sum or average over the day per the metric's aggregation policy.
        sampleCount:
          type: integer
          minimum: 0
          description: Contributing sample count for this day. Zero indicates a gap-fill placeholder.

    HealthDailyResponse:
      type: object
      required: [type, days]
      properties:
        type: { type: string }
        days:
          type: array
          items: { $ref: '#/components/schemas/HealthDayAggregateDTO' }
          description: Chronologically ascending; always exactly `days` entries long (gaps filled).

    # ── Skills ──

    SkillRunRequest:
      type: object
      properties:
        input:
          type: string
        arguments:
          type: object
          additionalProperties: { type: string }
        save:
          type: boolean

    SkillRunResponse:
      type: object
      required: [id, skillName, status, markdown, startedAt]
      properties:
        id: { type: string, format: uuid }
        skillName: { type: string }
        status: { $ref: '#/components/schemas/SkillRunStatus' }
        markdown: { type: string }
        savedPath: { type: [string, 'null'] }
        modelUsed: { type: [string, 'null'] }
        mtokIn: { type: [integer, 'null'] }
        mtokOut: { type: [integer, 'null'] }
        startedAt: { type: string, format: date-time }
        endedAt: { type: [string, 'null'], format: date-time }

    SkillSlashCommandRequest:
      type: object
      required: [command]
      properties:
        command: { type: string }

