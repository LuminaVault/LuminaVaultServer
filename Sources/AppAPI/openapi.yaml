    get:
      tags: [Achievements]
      operationId: achievementsRecent
      summary: Recently unlocked achievements.
      responses:
        '200':
          description: Recent unlocks.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AchievementsRecentResponse' }

  # ─────────────────────────────── Health ───────────────────────────────

  /v1/health:
    post:
      tags: [Health]
      operationId: healthIngest
      summary: Ingest health events (Apple Health / Withings / manual).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/HealthIngestRequest' }
      responses:
        '200':
          description: Ingested.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthIngestResponse' }
    get:
      tags: [Health]
      operationId: healthRead
      summary: Read ingested health events (HER-202).
      parameters:
        - in: query
          name: type
          schema: { type: string }
        - in: query
          name: from
          schema: { type: string, format: date-time }
        - in: query
          name: to
          schema: { type: string, format: date-time }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 100 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        '200':
          description: Health events page.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthListResponse' }

  /v1/health/daily:
    get:
      tags: [Health]
      operationId: healthDaily
      summary: Per-day aggregation window for a single event type (HER-118 sparkline source).
      description: |
        Returns a fixed-length chronological window of daily aggregates for the
        given `type`. Sum aggregation for accumulating metrics (`steps`,
        `active_energy`, `mindful_minutes`, `sleep_session`); average for
        instantaneous metrics (`hr_bpm`, `hrv_ms`, `weight_kg`, `blood_oxygen`,
        etc.). Gap-days are returned with `value: 0, sampleCount: 0` so the
        client can render sparklines without local bucketing or gap-fill logic.
      parameters:
        - in: query
          name: type
          required: true
          schema: { type: string }
          description: Lowercased event type identifier.
        - in: query
          name: days
          schema: { type: integer, minimum: 1, maximum: 90, default: 7 }
      responses:
        '200':
          description: Daily aggregation window.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HealthDailyResponse' }

