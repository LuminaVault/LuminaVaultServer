openapi: '3.1.0'

# HER-224 — full API contract for LuminaVaultServer. Hand-written
# Hummingbird routes are authoritative for routing; this YAML is the
# documentation contract + the source for `swift-openapi-generator`
# `types` output (DTOs only). A contract test enforces parity between
# this file and the live router. See plan: cuddly-baking-cake.md.

info:
  title: LuminaVaultServer
  version: 0.1.0
  description: |
    The LuminaVault second-brain backend. Hummingbird + Postgres + pgvector.
    Every authenticated route requires `Authorization: Bearer <jwt>` unless
    explicitly marked otherwise. Admin routes require `Authorization: Bearer
    <admin-token>` (the `admin.token` env var). The RevenueCat webhook
    requires `Authorization: Bearer <revenuecat-webhook-secret>`.

  contact:
    name: LuminaVault
    url: https://github.com/LuminaVault/LuminaVaultServer

servers:
  - url: http://localhost:8080
    description: Local development.
  - url: https://api.luminavault.example
    description: Production (placeholder).

tags:
  - name: Root
  - name: Auth
  - name: Me
  - name: Settings
    description: Per-user config — currently BYO Hermes gateway (HER-217/223).
  - name: Onboarding
  - name: Devices
    description: APNS / FCM device-token registration (HER-214).
  - name: Account
  - name: Billing
  - name: LLM
    description: Chat (HER-161/165), transcribe (HER-203), TTS (HER-204), vision/embed (HER-205).
  - name: Memory
  - name: Capture
    description: URL capture with async enrichment (HER-149).
  - name: Query
  - name: Conversations
    description: Multi-turn "thinking workspace" chat persistence (HER-37).
  - name: Memos
  - name: Vault
  - name: KB
    description: Knowledge-base compile (Hermes learning loop).
  - name: Import
    description: Feed Your Brain bulk import (links, bookmarks, files into Spaces).
  - name: Plugins
    description: Declarative plugin foundation — catalog, per-tenant installs, connector sync (HER-43).
  - name: Spaces
  - name: Soul
    description: SOUL.md CRUD (HER-85).
  - name: Achievements
    description: Usage-driven unlocks (HER-196).
  - name: Health
    description: Health-data ingest (HER-146) + read (HER-202).
  - name: Skills
    description: Skills hub (HER-247), Today outputs (HER-177), Automations (HER-178).
  - name: Profiles
    description: Multi-Hermes-persona CRUD per user (HER-273).
  - name: WebSocket
  - name: Admin
  - name: Dashboard
    description: OS Shell home/dashboard surface (HER-244).

security:
  - bearerJWT: []

paths:

  # ──────────────────────────────── Root ────────────────────────────────

  /:
    get:
      tags: [Root]
      operationId: getHello
      summary: Hello.
      security: []
      responses:
        '200':
          description: Plaintext greeting.
          content:
            text/plain:
              schema: { type: string }

  /health:
    get:
      tags: [Root]
      operationId: getRootHealth
      summary: Readiness probe.
      security: []
      responses:
        '200':
          description: "ok"
          content:
            text/plain:
              schema: { type: string }

  # ──────────────────────────────── Auth ────────────────────────────────

  /v1/auth/register:
    post:
      tags: [Auth]
      operationId: authRegister
      summary: Email + password registration.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterRequest' }
      responses:
        '200':
          description: Account created, session token issued.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/RateLimited'

  /v1/auth/login:
    post:
      tags: [Auth]
      operationId: authLogin
      summary: Email + password login.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Session token issued.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /v1/auth/refresh:
    post:
      tags: [Auth]
      operationId: authRefresh
      summary: Exchange a refresh token for a new access token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '200':
          description: New access + refresh token pair.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/auth/logout:
    post:
      tags: [Auth]
      operationId: authLogout
      summary: Revoke the active refresh token.
      responses:
        '204':
          description: Logged out.

  /v1/auth/mfa/verify:
    post:
      tags: [Auth]
      operationId: authMfaVerify
      summary: Verify a TOTP / OTP second factor.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MFAVerifyRequest' }
      responses:
        '200':
          description: Session token issued after second factor.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /v1/auth/mfa/resend:
    post:
      tags: [Auth]
      operationId: authMfaResend
      summary: Re-send the MFA challenge.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MFAResendRequest' }
      responses:
        '204':
          description: Challenge re-sent.
        '429':
          $ref: '#/components/responses/RateLimited'

  /v1/auth/forgot-password:
    post:
      tags: [Auth]
      operationId: authForgotPassword
      summary: Start password-reset flow.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EmailOnlyRequest' }
      responses:
        '204':
          description: Reset email sent (idempotent).
        '429':
          $ref: '#/components/responses/RateLimited'

  /v1/auth/resend-reset:
    post:
      tags: [Auth]
      operationId: authResendReset
      summary: Re-send the password-reset OTP.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EmailOnlyRequest' }
      responses:
        '204':
          description: Reset OTP re-sent.
        '429':
          $ref: '#/components/responses/RateLimited'

  /v1/auth/reset-password:
    post:
      tags: [Auth]
      operationId: authResetPassword
      summary: Complete password reset with OTP.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResetPasswordRequest' }
      responses:
        '204':
          description: Password reset.
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/auth/email/send-verify:
    post:
      tags: [Auth]
      operationId: authEmailSendVerify
      summary: Send email-verification OTP to the authenticated user.
      responses:
        '204':
          description: Verification OTP sent.

  /v1/auth/email/confirm:
    post:
      tags: [Auth]
      operationId: authEmailConfirm
      summary: Confirm email with the verification OTP.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EmailConfirmRequest' }
      responses:
        '204':
          description: Email confirmed.

  /v1/auth/oauth/apple/exchange:
    post:
      tags: [Auth]
      operationId: authOAuthAppleExchange
      summary: Exchange Apple Sign-In ID token for a LuminaVault session.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OAuthIDTokenRequest' }
      responses:
        '200':
          description: Session issued.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/auth/oauth/google/exchange:
    post:
      tags: [Auth]
      operationId: authOAuthGoogleExchange
      summary: Exchange Google ID token for a LuminaVault session.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OAuthIDTokenRequest' }
      responses:
        '200':
          description: Session issued.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /v1/auth/oauth/x/exchange:
    post:
      tags: [Auth]
      operationId: authOAuthXExchange
      summary: Exchange X (Twitter) access token for a LuminaVault session.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OAuthAccessTokenRequest' }
      responses:
        '200':
          description: Session issued.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }

  /v1/auth/phone/start:
    post:
      tags: [Auth]
      operationId: authPhoneStart
      summary: Send SMS OTP to a phone number.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PhoneStartRequest' }
      responses:
        '204':
          description: SMS sent.
        '429':
          $ref: '#/components/responses/RateLimited'

  /v1/auth/phone/verify:
    post:
      tags: [Auth]
      operationId: authPhoneVerify
      summary: Verify phone OTP, issue session.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PhoneVerifyRequest' }
      responses:
        '200':
          description: Session issued.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }

  /v1/auth/email/start:
    post:
      tags: [Auth]
      operationId: authEmailStart
      summary: Send magic-link OTP to email.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EmailOnlyRequest' }
      responses:
        '204':
          description: Magic link sent.
        '429':
          $ref: '#/components/responses/RateLimited'

  /v1/auth/email/verify:
    post:
      tags: [Auth]
      operationId: authEmailVerify
      summary: Verify magic-link OTP, issue session.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EmailMagicVerifyRequest' }
      responses:
        '200':
          description: Session issued.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }

  /v1/auth/webauthn/register/begin:
    post:
      tags: [Auth]
      operationId: authWebAuthnRegisterBegin
      summary: Begin WebAuthn passkey registration — returns PublicKeyCredentialCreationOptions.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebAuthnBeginRegistrationRequest' }
      responses:
        '200':
          description: PublicKeyCredentialCreationOptions JSON.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WebAuthnOptions' }
        '503':
          description: WebAuthn disabled (WEBAUTHN_ENABLED=false).

  /v1/auth/webauthn/register/finish:
    post:
      tags: [Auth]
      operationId: authWebAuthnRegisterFinish
      summary: Finalise WebAuthn credential registration.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebAuthnFinish' }
      responses:
        '200':
          description: Credential registered.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WebAuthnFinishRegistrationResponse' }

  /v1/auth/webauthn/authenticate/begin:
    post:
      tags: [Auth]
      operationId: authWebAuthnAuthenticateBegin
      summary: Begin WebAuthn passkey authentication — returns PublicKeyCredentialRequestOptions.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebAuthnAuthOptionsRequest' }
      responses:
        '200':
          description: PublicKeyCredentialRequestOptions JSON.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WebAuthnOptions' }

  /v1/auth/webauthn/authenticate/finish:
    post:
      tags: [Auth]
      operationId: authWebAuthnAuthenticateFinish
      summary: Finalise WebAuthn authentication, issue session.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/WebAuthnFinish' }
      responses:
        '200':
          description: Session issued.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }

  /v1/auth/webauthn/credentials:
    get:
      tags: [Auth]
      operationId: authWebAuthnListCredentials
      summary: List enrolled WebAuthn passkeys for the authenticated user.
      responses:
        '200':
          description: Credential summaries.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WebAuthnCredentialListResponse' }
        '401':
          description: Not authenticated.

  /v1/auth/webauthn/credentials/{credentialId}:
    delete:
      tags: [Auth]
      operationId: authWebAuthnDeleteCredential
      summary: Revoke a WebAuthn passkey for the authenticated user.
      parameters:
        - name: credentialId
          in: path
          required: true
          schema: { type: string }
          description: Base64url credential ID.
      responses:
        '204':
          description: Credential revoked.
        '404':
          description: Credential not found.

  # ──────────────────────────────── Me ──────────────────────────────────

  /v1/auth/me:
    get:
      tags: [Me]
      operationId: meGet
      summary: Get the authenticated user's profile.
      responses:
        '200':
          description: User profile.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MeResponse' }

  /v1/auth/me/privacy:
    put:
      tags: [Me]
      operationId: mePrivacyUpdate
      summary: Update privacy flags.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdatePrivacyRequest' }
      responses:
        '200':
          description: Updated profile.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MeResponse' }

  /v1/auth/me/billing:
    get:
      tags: [Me]
      operationId: meBilling
      summary: Tier + trial status + days remaining.
      responses:
        '200':
          description: Billing snapshot.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MeBillingResponse' }

  /v1/me/today:
    get:
      tags: [Me]
      operationId: meToday
      summary: Widget + daily-review digest (HER-206).
      responses:
        '200':
          description: Today snapshot.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MeTodayResponse' }
        '429':
          $ref: '#/components/responses/RateLimited'

  # ────────────────── Dashboard — OS Shell Home (HER-244) ───────────────

  # ───────────────────────── Me — Suggestions (HER-37) ──────────────────

  /v1/me/suggestions:
    get:
      tags: [Me]
      operationId: meSuggestions
      summary: Context-aware natural-language query suggestions (HER-37).
      responses:
        '200':
          description: Suggestions list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SuggestionsResponse' }
        '429':
          $ref: '#/components/responses/RateLimited'

  # ─────────────────── Skills (HER-247 / HER-177 / HER-178) ────────────

  /v1/skills:
    get:
      tags: [Skills]
      operationId: skillsList
      summary: List skills + per-tenant state for the Skills hub (HER-247).
      responses:
        '200':
          description: Skill list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SkillListResponse' }

  /v1/skills/{name}:
    patch:
      tags: [Skills]
      operationId: skillPatch
      summary: Toggle enable/disable, set schedule override, or pick APNS category (HER-247 / HER-178).
      parameters:
        - in: path
          name: name
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SkillPatchRequest' }
      responses:
        '200':
          description: Updated skill snapshot.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SkillDTO' }
        '400':
          description: Invalid cron expression or category.
        '404':
          description: Skill not found.

  /v1/skills/{name}/runs:
    get:
      tags: [Skills]
      operationId: skillRuns
      summary: Paginated run history + 14-day sparkline for the Skills hub detail view (HER-247).
      parameters:
        - in: path
          name: name
          required: true
          schema: { type: string }
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
      responses:
        '200':
          description: Run history + sparkline.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SkillRunsResponse' }

  /v1/skills/outputs:
    get:
      tags: [Skills]
      operationId: skillOutputs
      summary: Today-tab skill outputs feed (HER-177). Empty until skill dispatch lands (HER-169).
      parameters:
        - in: query
          name: since
          required: false
          schema: { type: string, format: date-time }
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
      responses:
        '200':
          description: Outputs feed + streak + active-run flag.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SkillOutputListResponse' }

  /v1/me/apns-categories:
    get:
      tags: [Me]
      operationId: apnsPrefsGet
      summary: Per-tenant APNS category opt-out (HER-179).
      responses:
        '200':
          description: Current preferences.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/APNSCategoryPrefsResponse' }
    put:
      tags: [Me]
      operationId: apnsPrefsPut
      summary: Update per-tenant APNS category opt-out (HER-179).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/APNSCategoryPrefsPutRequest' }
      responses:
        '200':
          description: Updated preferences.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/APNSCategoryPrefsResponse' }

  /v1/sessions:
    get:
      tags: [Dashboard]
      operationId: sessionsList
      summary: List chat-history sessions for the OS Shell Sessions tab (HER-245 / HER-259).
      parameters:
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
        - in: query
          name: workspace
          required: false
          description: HER-261 — scope to a single Workspace (Space) ID.
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Session list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SessionListResponse' }

  /v1/dashboard/stats:
    get:
      tags: [Dashboard]
      operationId: dashboardStats
      summary: Aggregated counters for the Home/Dashboard surface (HER-244).
      description: |
        Returns the small set of numbers the iOS Home/Dashboard renders:
        memories created today, total memories ever, and the most recent
        space compile timestamp. Per-tenant scoped.
      responses:
        '200':
          description: Dashboard stats snapshot.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DashboardStatsResponse' }

  /v1/dashboard/profile:
    get:
      tags: [Dashboard]
      operationId: dashboardProfile
      summary: Player-profile HUD counters for the Home dashboard.
      description: |
        Returns the "player profile" numbers the iOS Home dashboard renders:
        enabled skills, total skill runs (jobs), conversations (sessions),
        unlocked achievements (badges), and a derived power level + XP.
        Per-tenant scoped.
      responses:
        '200':
          description: Dashboard profile snapshot.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DashboardProfileResponse' }

  /v1/dashboard/home:
    get:
      tags: [Dashboard]
      operationId: dashboardHome
      summary: One-shot counts + active profile for the Home dashboard.
      description: |
        Aggregates every Home card count in a single request: enabled skills,
        skill runs (jobs), reminders, todos, non-archived projects, active
        insights, plus the active Hermes profile's name + slug. Per-tenant.
      responses:
        '200':
          description: Home summary snapshot.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HomeSummaryResponse' }

  /v1/analytics/usage-summary:
    get:
      tags: [Analytics]
      operationId: analyticsUsageSummary
      summary: Month-to-date usage analytics for the caller.
      description: |
        LLM token totals (in/out) and embedding tokens for the current
        calendar month, plus session count and a coarse blended cost estimate
        in cents. Powers the Home "Insights" card.
      responses:
        '200':
          description: Usage summary for the current period.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UsageSummaryResponse' }

  /v1/tasks:
    get:
      tags: [Dashboard]
      operationId: tasksList
      summary: List active and recent Hermes tasks (HER-244 / HER-246).
      description: |
        Per-tenant list of long-running operations (kb-compile, deep
        analysis, skill runs). Initial implementation returns an empty
        list — real job tracking ships under HER-246.
      parameters:
        - in: query
          name: state
          required: false
          schema:
            type: string
            enum: [running, queued, completed, failed]
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
      responses:
        '200':
          description: Task list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TaskListResponse' }

  /v1/insights:
    get:
      tags: [Dashboard]
      operationId: insightsList
      summary: List proactive insights (HER-37 Slice D).
      description: |
        Per-tenant list of "what Lumina noticed" findings, newest
        first. Dismissed rows are filtered out — soft-dismiss via
        `POST /v1/insights/{id}/dismiss`. Populated by the
        SynthesisWorker; empty until the worker fires for the first
        time.
      parameters:
        - in: query
          name: section
          required: false
          schema:
            type: string
            enum: [this_week, this_month, patterns, contradictions, connections]
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 50 }
      responses:
        '200':
          description: Insight list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InsightListResponse' }

  /v1/insights/synthesis/latest:
    get:
      tags: [Dashboard]
      operationId: insightsLatestSynthesis
      summary: Newest weekly/monthly synthesis row (HER-37 Slice D).
      description: |
        Returns the most recent `thisWeek` or `thisMonth` row for the
        tenant, regardless of dismissal. iOS hides the synthesis card
        when this returns 404.
      responses:
        '200':
          description: Latest synthesis insight.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/InsightDTO' }
        '404':
          description: No synthesis available yet.

  /v1/insights/{id}/dismiss:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Dashboard]
      operationId: insightsDismiss
      summary: Soft-dismiss an insight (HER-37 Slice D).
      description: |
        Sets `dismissed_at`. The row stays in the table for audit but
        stops appearing in the `list` endpoint.
      responses:
        '204':
          description: Insight dismissed.
        '404':
          description: Insight not found.

  # ─────────────────────── Settings — BYO Hermes ────────────────────────

  /v1/settings/hermes:
    get:
      tags: [Settings]
      operationId: hermesConfigGet
      summary: Get the per-user Hermes gateway override (HER-217).
      responses:
        '200':
          description: Override config.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HermesConfigGetResponse' }
        '404':
          description: No row — falling back to managed default.
    put:
      tags: [Settings]
      operationId: hermesConfigPut
      summary: Upsert the Hermes gateway override.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/HermesConfigPutRequest' }
      responses:
        '200':
          description: Updated config (verifiedAt reset to null).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HermesConfigGetResponse' }
        '400':
          description: SSRFGuard rejection (invalid_base_url:<reason>).
    delete:
      tags: [Settings]
      operationId: hermesConfigDelete
      summary: Drop the override; revert to managed default.
      responses:
        '204':
          description: Row deleted.

  /v1/settings/hermes/test:
    post:
      tags: [Settings]
      operationId: hermesConfigTest
      summary: Probe the configured gateway and bump verified_at on success.
      responses:
        '200':
          description: Verified.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HermesConfigTestResponse' }
        '404':
          description: No config to test.
        '502':
          description: |
            Probe failed. `message` is a stable TestError code:
            `timeout` / `tls_error` / `http_4xx` / `http_5xx` /
            `ssrf_rejected` / `decrypt_failed` / `unreachable`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  # ─────────── Me — External LLM provider credentials (HER-252) ──────────

  /v1/me/providers:
    get:
      tags: [Me]
      operationId: providersList
      summary: List per-user external LLM provider credentials (HER-252).
      description: |
        Returns one row per supported provider. Plaintext credentials are
        never echoed — only `hasCredential` and metadata. Providers with
        no row are returned with `hasCredential: false`.
      responses:
        '200':
          description: List of provider credential records.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProviderCredentialsListResponse' }

  /v1/me/providers/{provider}:
    parameters:
      - in: path
        name: provider
        required: true
        schema: { $ref: '#/components/schemas/ProviderID' }
    put:
      tags: [Me]
      operationId: providerCredentialPut
      summary: Upsert credentials for a provider.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProviderCredentialPutRequest' }
      responses:
        '200':
          description: Updated record (verifiedAt + lastFailure* reset).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProviderCredentialDTO' }
        '400':
          description: Validation error (api_key_required / base_url_required / invalid_base_url).
    delete:
      tags: [Me]
      operationId: providerCredentialDelete
      summary: Drop credentials for a provider.
      responses:
        '204':
          description: Row deleted (idempotent — 204 even if absent).

  /v1/me/providers/{provider}/test:
    parameters:
      - in: path
        name: provider
        required: true
        schema: { $ref: '#/components/schemas/ProviderID' }
    post:
      tags: [Me]
      operationId: providerCredentialTest
      summary: Probe the credential with a 1-token chat request.
      description: |
        Builds a one-off adapter using the stored credential and sends a
        `max_tokens: 1` request. On 2xx the row's `verifiedAt` is stamped
        and `lastFailure*` cleared. On any other outcome the row is
        marked failed and a stable code is returned.
      responses:
        '200':
          description: Verified.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProviderTestResponse' }
        '400':
          description: |
            Stable code in `message`:
            `no_credential` (no stored row) /
            `unsupported_provider` (unknown path param).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
        '502':
          description: |
            Probe failed. Stable code in `message`:
            `credit_exhausted` / `rate_limit` / `upstream_error` /
            `upstream_rejected` / `network` / `tls_error` / `timeout`.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  # ─────────────── Me — Hermes Messaging Gateways (HER-241) ────────────────

  /v1/me/hermes-gateways:
    get:
      tags: [Me]
      operationId: hermesGatewaysList
      summary: List supported Hermes messaging gateways + per-user status (HER-241).
      description: |
        Returns one row per supported gateway (telegram, discord, slack,
        whatsapp). Plaintext config is never echoed — only `hasConfig`
        and metadata. Gateways with no stored row are returned with
        `status: not_configured` and `hasConfig: false`.
      responses:
        '200':
          description: List of gateway catalog entries with status.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HermesGatewaysListResponse' }

  /v1/me/hermes-gateways/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { $ref: '#/components/schemas/HermesGatewayID' }
    get:
      tags: [Me]
      operationId: hermesGatewayGet
      summary: Get a single gateway's catalog entry + status.
      responses:
        '200':
          description: Gateway catalog entry.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HermesGatewayCatalogEntry' }
        '404':
          description: Unsupported gateway id (`unsupported_gateway`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    put:
      tags: [Me]
      operationId: hermesGatewayPut
      summary: Upsert encrypted config for a gateway.
      description: |
        Validates every required field for the chosen gateway. On
        success the row is created or updated and `status` becomes
        `configured`. `verifiedAt` and `lastFailure*` are reset so a
        new /test call is required to confirm reachability.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/HermesGatewayPutRequest' }
      responses:
        '200':
          description: Updated catalog entry.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HermesGatewayCatalogEntry' }
        '400':
          description: |
            Stable code in `message`:
            `missing_field:<key>` (required field empty).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }
    delete:
      tags: [Me]
      operationId: hermesGatewayDelete
      summary: Drop a gateway's stored config.
      responses:
        '204':
          description: Row deleted (idempotent — 204 even if absent).

  /v1/me/hermes-gateways/{id}/test:
    parameters:
      - in: path
        name: id
        required: true
        schema: { $ref: '#/components/schemas/HermesGatewayID' }
    post:
      tags: [Me]
      operationId: hermesGatewayTest
      summary: Probe the user's Hermes server's `/v1/health` for reachability.
      description: |
        Hermes today exposes no gateway-admin HTTP API; this endpoint
        only confirms the user's Hermes server is reachable and
        responds 2xx on `/v1/health`. On success `verifiedAt` is
        stamped; on failure `lastFailureCode` is recorded. The
        gateway's own operational state must be checked via the
        `hermes gateway status` CLI on the Hermes host.
      responses:
        '200':
          description: Probe result (200 even on failure — see `ok`).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HermesGatewayTestResponse' }
        '400':
          description: |
            Stable code in `message`:
            `hermes_not_configured` (user has no resolved Hermes endpoint).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  # ─────────────── Me — LLM routing preferences (HER-252) ────────────────

  /v1/me/preferences/llm:
    get:
      tags: [Me]
      operationId: llmPreferencesGet
      summary: Get per-user primary model + fallback chain (HER-252).
      description: |
        Always returns 200. If no row exists, returns a deployment-default
        primary so clients have something sensible to render.
      responses:
        '200':
          description: Preference snapshot (real or default).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LLMPreferencesGetResponse' }
    put:
      tags: [Me]
      operationId: llmPreferencesPut
      summary: Upsert the primary model + ordered fallback chain.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LLMPreferencesPutRequest' }
      responses:
        '200':
          description: Updated snapshot.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LLMPreferencesGetResponse' }
        '400':
          description: |
            Validation error in `message`:
            `primary_model_required` / `fallback_model_required`.

  # ───────────────────────────── Onboarding ─────────────────────────────

  /v1/onboarding:
    get:
      tags: [Onboarding]
      operationId: onboardingGet
      summary: Server-tracked resumable onboarding state (HER-93).
      responses:
        '200':
          description: Onboarding state.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OnboardingStateDTO' }
    patch:
      tags: [Onboarding]
      operationId: onboardingPatch
      summary: Latch one or more onboarding flags (one-way only).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OnboardingPatchRequest' }
      responses:
        '200':
          description: Updated state.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OnboardingStateDTO' }
        '400':
          description: Attempted to set a flag to false (latches are one-way).

  # ────────────────────────────── Devices ───────────────────────────────

  /v1/devices:
    post:
      tags: [Devices]
      operationId: deviceRegister
      summary: Register an APNS / FCM device token.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DeviceRegistrationRequest' }
      responses:
        '200':
          description: Registered.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DeviceRegistrationResponse' }

  /v1/devices/{token}:
    delete:
      tags: [Devices]
      operationId: deviceUnregister
      summary: Unregister a device token.
      parameters:
        - in: path
          name: token
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Unregistered.

  # ────────────────────────────── Account ───────────────────────────────

  /v1/account:
    delete:
      tags: [Account]
      operationId: accountDelete
      summary: GDPR right-to-erasure (HER-92).
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AccountDeleteRequest' }
      responses:
        '204':
          description: Account wiped.
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ────────────────────────────── Billing ───────────────────────────────

  /v1/billing/revenuecat-webhook:
    post:
      tags: [Billing]
      operationId: billingRevenueCatWebhook
      summary: RevenueCat server-to-server webhook (HER-184).
      security:
        - revenueCatWebhookSecret: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RevenueCatWebhookBody' }
      responses:
        '204':
          description: Event ingested.
        '401':
          description: Bad webhook secret.
        '503':
          description: Webhook disabled (revenuecat.webhookSecret empty).

  # ──────────────────────────────── LLM ─────────────────────────────────

  /v1/llm/chat:
    post:
      tags: [LLM]
      operationId: llmChat
      summary: Chat completion. Routes via TableModelRouter; BYO Hermes-aware.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChatRequest' }
      responses:
        '200':
          description: OpenAI-compatible chat-completions response.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ChatResponse' }
        '402':
          description: Entitlement / billing block.
        '429':
          $ref: '#/components/responses/RateLimited'
        '502':
          description: LLM upstream rejected, was unreachable, or all providers exhausted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpstreamError'
        '504':
          description: LLM upstream timed out. Safe to retry once after retry_after_ms.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpstreamError'

  /v1/transcribe:
    post:
      tags: [LLM]
      operationId: llmTranscribe
      summary: Speech-to-text (HER-203). Multipart audio upload.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema: { $ref: '#/components/schemas/TranscribeMultipartRequest' }
      responses:
        '200':
          description: Transcription result.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TranscribeResponse' }

  /v1/tts:
    post:
      tags: [LLM]
      operationId: llmTTS
      summary: Text-to-speech (HER-204). Returns audio/mpeg.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TTSRequest' }
      responses:
        '200':
          description: MP3 audio stream.
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary

  /v1/vision/embed:
    post:
      tags: [LLM]
      operationId: llmVisionEmbed
      summary: Image embedding (HER-205). Returns a float vector.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VisionEmbedRequest' }
      responses:
        '200':
          description: Embedding vector.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VisionEmbedResponse' }

  # ────────────────────────────── Memory ────────────────────────────────

  /v1/memory:
    get:
      tags: [Memory]
      operationId: memoryList
      summary: List memories for the authenticated user.
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - in: query
          name: offset
          schema: { type: integer, minimum: 0, default: 0 }
        - in: query
          name: tag
          schema: { type: string }
          description: HER-18 — filter to memories carrying this tag.
        - in: query
          name: reviewState
          schema: { type: string }
          description: |
            HER-290 — comma-separated subset of `auto | pending | approved | rejected`
            (e.g. `pending` or `pending,approved`). When omitted, the default
            returns all states except `rejected`.
      responses:
        '200':
          description: Memory page.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MemoryListResponse' }

  /v1/memory/upsert:
    post:
      tags: [Memory]
      operationId: memoryUpsert
      summary: Capture a memory (creates or updates by content hash).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MemoryUpsertRequest' }
      responses:
        '200':
          description: Stored memory.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MemoryDTO' }

  /v1/memory/search:
    post:
      tags: [Memory]
      operationId: memorySearch
      summary: Semantic + lexical memory search.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MemorySearchRequest' }
      responses:
        '200':
          description: Ranked results.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MemorySearchResponse' }

  /v1/memory/{id}:
    parameters:
      - $ref: '#/components/parameters/MemoryId'
    get:
      tags: [Memory]
      operationId: memoryGet
      summary: Fetch a single memory.
      responses:
        '200':
          description: Memory.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MemoryDTO' }
        '404':
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [Memory]
      operationId: memoryPatch
      summary: Partial update.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MemoryPatchRequest' }
      responses:
        '200':
          description: Updated memory.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MemoryDTO' }
    delete:
      tags: [Memory]
      operationId: memoryDelete
      summary: Hard delete (does not archive).
      responses:
        '204':
          description: Deleted.

  /v1/memory/{id}/lineage:
    parameters:
      - $ref: '#/components/parameters/MemoryId'
    get:
      tags: [Memory]
      operationId: memoryLineage
      summary: Trace a memory's source vault file + enrichment chain.
      responses:
        '200':
          description: Lineage tree.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MemoryLineageResponse' }

  /v1/memory/graph:
    get:
      tags: [Memory]
      operationId: memoryGraph
      summary: Derived memory graph for the current tenant (HER-235).
      description: |
        Nodes are top-scored memories; edges are derived on read from shared
        tags + pgvector cosine similarity. No edges are persisted in v1.
      parameters:
        - in: query
          name: limit
          description: Max number of nodes returned (highest-scored memories first).
          schema: { type: integer, minimum: 1, maximum: 2000, default: 500 }
        - in: query
          name: similarityThreshold
          description: |
            Minimum cosine similarity (1 - pgvector distance) required for a
            semantic edge. Values in [0, 1]; 0 keeps every comparable pair.
          schema: { type: number, format: double, minimum: 0.0, maximum: 1.0, default: 0.78 }
        - in: query
          name: maxEdgesPerNode
          description: |
            After tag + semantic edges are merged, each node is pruned to its
            top-K strongest edges by weight (undirected).
          schema: { type: integer, minimum: 1, maximum: 50, default: 8 }
      responses:
        '200':
          description: Derived graph for the current tenant.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MemoryGraphResponse' }

  # ────────────────────────────── Capture ───────────────────────────────

  /v1/capture/safari:
    post:
      tags: [Capture]
      operationId: captureSafari
      summary: Capture a URL with async OG / YouTube / X enrichment (HER-149).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CaptureSafariRequest' }
      responses:
        '200':
          description: Capture queued; vault file id returned.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CaptureSafariResponse' }

  # ─────────────────────────────── Query ────────────────────────────────

  /v1/query:
    post:
      tags: [Query]
      operationId: query
      summary: Natural-language semantic search across memories + vault.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QueryRequest' }
      responses:
        '200':
          description: Query result.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QueryResponse' }

  /v1/query/stream:
    post:
      tags: [Query]
      operationId: queryStream
      summary: Streaming natural-language semantic query (SSE).
      description: |
        Returns `text/event-stream` — each event is a JSON-encoded
        `QueryStreamEvent` on a single SSE `data:` line.

        Streams an answer in this order:

        1. One `source` event per top-N retrieved memory hit (client may
           render source chips immediately).
        2. Many `token` events as the LLM produces output deltas.
        3. Optional `summary` event with the final concatenated answer.
        4. One `follow_ups` event with server-generated follow-up chips.
        5. One `done` event to terminate the stream.

        On stream-level failures an `error` event is emitted in lieu of
        `done`. Clients should abort the read loop on either terminator.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QueryRequest' }
      responses:
        '200':
          description: Server-Sent Events stream of `QueryStreamEvent`.
          content:
            text/event-stream:
              schema: { $ref: '#/components/schemas/QueryStreamEvent' }

  # ─────────────────────────── Conversations ────────────────────────────

  /v1/conversations:
    post:
      tags: [Conversations]
      operationId: conversationCreate
      summary: Create a new chat conversation (HER-37).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ConversationCreateRequest' }
      responses:
        '200':
          description: Created conversation.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConversationDTO' }
    get:
      tags: [Conversations]
      operationId: conversationList
      summary: List the caller's conversations, newest first (HER-37).
      responses:
        '200':
          description: Conversation list.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConversationListResponse' }

  /v1/conversations/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Conversations]
      operationId: conversationGet
      summary: Conversation detail with full message transcript (HER-37).
      responses:
        '200':
          description: Conversation + ordered messages.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ConversationDetailResponse' }
        '404':
          description: Conversation not found.
    delete:
      tags: [Conversations]
      operationId: conversationDelete
      summary: Delete a conversation and its messages (HER-37).
      responses:
        '204':
          description: Conversation deleted.
        '404':
          description: Conversation not found.

  /v1/conversations/{id}/messages/stream:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Conversations]
      operationId: conversationStreamReply
      summary: Stream an assistant turn over SSE (HER-37).
      description: |
        Persists the user's message immediately, then streams the
        assistant reply as `QueryStreamEvent`s (`source` → `token`s →
        `follow_ups` → `done`). The assistant turn is persisted exactly
        once on `done`; mid-flight failures emit `error` and abort
        persistence.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MessageStreamRequest' }
      responses:
        '200':
          description: Server-Sent Events stream of `QueryStreamEvent`.
          content:
            text/event-stream:
              schema: { $ref: '#/components/schemas/QueryStreamEvent' }
        '404':
          description: Conversation not found.

  # ──────────────────────────────── Memos ───────────────────────────────

  /v1/memos:
    post:
      tags: [Memos]
      operationId: memoGenerate
      summary: Generate a memo (agent loop → markdown synthesis → vault save).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MemoGenerateRequest' }
      responses:
        '200':
          description: Memo generated.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MemoGenerateResponse' }
    get:
      tags: [Memos]
      operationId: memoList
      summary: List memos saved under memos/<date>/<slug>.md for the caller (HER-37).
      responses:
        '200':
          description: Memo list (most-recent first, max 200).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MemoListResponse' }

  # ─────────────────────────────── Vault ────────────────────────────────

  /v1/vault/files:
    post:
      tags: [Vault]
      operationId: vaultUpload
      summary: Upload a vault file (markdown / image / arbitrary blob).
      description: |
        Raw-body upload. The relative path under `<rawRoot>/` is supplied via
        the `path` query param; the body bytes are written verbatim. The
        optional `space_id` query param associates the row with a Space the
        caller owns — used by the iOS Capture tab so first-tap captures land
        directly into the active Space without a separate move call.
      parameters:
        - in: query
          name: path
          required: true
          description: Tenant-relative file path (e.g. `notes/today.md`).
          schema: { type: string }
        - in: query
          name: space_id
          description: |
            Optional Space association (HER-CaptureTab). Must belong to the
            caller's tenant; cross-tenant UUIDs and malformed UUIDs both
            return 400. Omit to leave the file unfiled. On re-upload to an
            existing path, a provided value overwrites the prior link; an
            omitted value leaves the existing link intact.
          schema: { type: string, format: uuid }
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        '200':
          description: File stored.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VaultUploadResponse' }
        '400':
          description: Malformed `path`, malformed `space_id`, cross-tenant space, empty body, or content-type mismatch.
    get:
      tags: [Vault]
      operationId: vaultList
      summary: List vault files.
      parameters:
        - in: query
          name: space
          description: >-
            Filter by Space slug (HER-9 binding). The reserved value `inbox`
            returns unfiled notes (space_id IS NULL) instead of resolving a
            Space row.
          schema: { type: string }
        - in: query
          name: unfiled
          description: >-
            When `true`, returns only unfiled notes (space_id IS NULL). Alias
            for `space=inbox`. The Inbox bucket uses this.
          schema: { type: boolean }
        - in: query
          name: q
          description: Case-insensitive substring match on file path (HER-105).
          schema: { type: string }
        - in: query
          name: before
          description: Cursor — ISO-8601 createdAt; returns rows older than this.
          schema: { type: string, format: date-time }
        - in: query
          name: after
          description: Cursor — ISO-8601 createdAt; returns rows newer than this.
          schema: { type: string, format: date-time }
        - in: query
          name: limit
          schema: { type: integer, default: 100 }
      responses:
        '200':
          description: Vault file index.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VaultListResponse' }

  /v1/vault/files/move:
    post:
      tags: [Vault]
      operationId: vaultMove
      summary: Rename / move a vault file.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VaultMoveRequest' }
      responses:
        '200':
          description: Updated file.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VaultFileDTO' }

  /v1/vault/files/{path}:
    get:
      tags: [Vault]
      operationId: vaultRead
      summary: Stream raw bytes for a single tenant-owned vault file (HER-105).
      parameters:
        - in: path
          name: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: File body with the stored `Content-Type`.
          content:
