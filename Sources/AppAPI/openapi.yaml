      responses:
        '204':
          description: Uninstalled.

  /v1/plugins/installs/{id}/sync:
    post:
      tags: [Plugins]
      operationId: pluginSync
      summary: Run a connector install now — stages its items into the import inbox.
      description: |
        Connector capability only. Returns a standard import session id; follow
        with POST /v1/import/{id}/categorize then /approve to file + compile.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Sync staged items into a new import session.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PluginSyncResponse' }

  /v1/kb-compile:
    post:
      tags: [KB]
      operationId: kbCompileLegacy
      deprecated: true
      summary: Deprecated. Use POST /v1/memory-compile.
      description: |
        Returns 308 Permanent Redirect to `/v1/memory-compile`. Kept one
        milestone after the rename for client-migration safety. Will be
        removed once telemetry shows zero callers remaining.
      responses:
        '308':
          description: Permanent redirect to the canonical path.
          headers:
            Location:
              schema: { type: string }
              description: Always `/v1/memory-compile`.

  /v1/kb-compile/pending:
    get:
      tags: [KB]
      operationId: kbCompilePendingLegacy
      deprecated: true
      summary: Deprecated. Use GET /v1/memory-compile/pending.
      description: |
        Returns 308 Permanent Redirect to `/v1/memory-compile/pending`.
        Kept one milestone after the rename for client-migration safety.
      responses:
        '308':
          description: Permanent redirect to the canonical path.
          headers:
            Location:
              schema: { type: string }
              description: Always `/v1/memory-compile/pending`.

