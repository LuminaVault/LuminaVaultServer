      responses:
        '200':
          description: Vault status.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VaultStatusResponse' }

  # ─────────────────────────────── KB ───────────────────────────────────

  /v1/memory-compile:
    post:
      tags: [KB]
      operationId: memoryCompile
      summary: Compile vault rows through the Hermes learning loop ("Sync & Learn").
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      description: |
        Reads `vault_files` rows for the caller and runs the per-tenant Hermes
        agent loop over them. Three input modes:

          * `vaultFileIds == null` (default) — compile every row where
            `processed_at` is null. This is the one-tap UX behind the iOS
            "Sync & Learn" button.
          * `vaultFileIds == [ids]` — compile exactly those rows (tenant-scoped).
          * `forceFullRecompile == true` — compile every row for the tenant,
            ignoring `processed_at` and any explicit IDs.

        Tap-with-nothing-pending is a no-op success: `memoriesIngested: 0` and
        no side effects. First successful compile flips
        `OnboardingState.firstKBCompileCompleted` (wire-format field name
        preserved for backward compat) and emits the `kb_compiled` achievement
        event.

        HER-240 / spec ticket #2 — renamed from `/v1/kb-compile`. The legacy
        path returns 308 Permanent Redirect to this one through one milestone
        for client-migration safety.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/KBCompileRequest' }
      responses:
        '200':
          description: Compile result.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/KBCompileResponse' }

  /v1/memory-compile/pending:
    get:
      tags: [KB]
      operationId: memoryCompilePending
      summary: Cheap count of vault rows with `processed_at` IS NULL (HER-293).
      description: |
        Drives the disabled state and microcopy of the iOS "Sync & Learn"
        button (HER-108). Returns `{ pendingFiles: 0 }` when nothing is
        pending so the client can disable the CTA instead of letting users
        tap into the empty `memoriesIngested: 0` no-op response.

        Tenant-scoped via the standard auth middleware. Backed by a single
        indexed `COUNT(*)` against `vault_files` filtered by tenant + NULL
        `processed_at`, so the endpoint is cheap to poll on screen focus.

        HER-240 / spec ticket #2 — renamed from `/v1/kb-compile/pending`.
        Legacy path 308-redirects to this one for one milestone.
      responses:
        '200':
          description: Pending count.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/KBCompilePendingResponse' }

  /v1/import:
    post:
      tags: [Import]
      operationId: importLinks
      summary: Stage a batch of URLs into the import inbox ("Feed Your Brain").
      description: |
        Stages each http(s) URL as a vault file in the reserved `imported`
        Space (deduped by URL), tracked under a new import session. Follow with
        POST /v1/import/{id}/categorize, then /approve.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ImportCreateRequest' }
      responses:
        '200':
          description: Import session created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImportCreateResponse' }

  /v1/import/bookmarks:
    post:
      tags: [Import]
      operationId: importBookmarks
      summary: Stage links from a Netscape bookmarks HTML export.
      description: |
        Raw bookmarks HTML body (Safari / Chrome "Export Bookmarks"). Parses
        out http(s) links and stages them like POST /v1/import.
      requestBody:
        required: true
        content:
          text/html:
            schema: { type: string }
      responses:
        '200':
          description: Import session created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImportCreateResponse' }

  /v1/import/files:
    post:
      tags: [Import]
      operationId: importFiles
      summary: Open an import session over already-uploaded vault files.
      description: |
        For photos / documents / EventKit-rendered notes: the client first
        uploads each via POST /v1/vault/files, then registers the returned ids
        here so they flow through categorize → approve.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ImportFilesRequest' }
      responses:
        '200':
          description: Import session created.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImportCreateResponse' }

  /v1/import/{id}:
    get:
      tags: [Import]
      operationId: importStatus
      summary: Import session status + items (with proposed Spaces).
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Session status.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImportStatusResponse' }

  /v1/import/{id}/categorize:
    post:
      tags: [Import]
      operationId: importCategorize
      summary: Run Smart Import LLM categorization; returns the proposal.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Updated session with proposed Spaces per item.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImportStatusResponse' }

  /v1/import/{id}/approve:
    post:
      tags: [Import]
      operationId: importApprove
      summary: Apply the Space mapping — file items, enrich links, scoped compile.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ImportApproveRequest' }
      responses:
        '200':
          description: Import filed and compiled.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ImportApproveResponse' }

