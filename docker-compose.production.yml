services:
  app:
    image: ${APP_IMAGE}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    volumes:
      - ./data/luminavault:/app/data/luminavault # tenant raw vault root (shared with hermes)
      - ./data/hermes:/app/data/hermes           # hermes filesystem gateway target
      - ./secrets:/app/secrets:ro                # APNS .p8 etc
    environment:
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 8080
      # --- Postgres ---
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: ${POSTGRES_DB:-hermes_db}
      POSTGRES_USER: ${POSTGRES_USER:-hermes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      FLUENT_AUTOMIGRATE: ${FLUENT_AUTOMIGRATE:-false}
      # --- Auth ---
      # HER-33: JWT_HMAC_SECRET + JWT_KID is the legacy single-key path.
      # JWT_HMAC_SECRETS (csv `kid:secret,kid:secret`) supersedes it and
      # enables zero-downtime rotation. Production should prefer it. See
      # docs/CONFIG.md section "JWT key rotation".
      JWT_HMAC_SECRET: ${JWT_HMAC_SECRET:?required}
      JWT_KID: ${JWT_KID:-lv-prod}
      JWT_HMAC_SECRETS: ${JWT_HMAC_SECRETS:-}
      # --- Email magic-link / OTP delivery (HER-33) ---
      # Production MUST set EMAIL_KIND=resend or magic-link OTPs only log
      # to stderr. Sender domain in EMAIL_FROM_ADDRESS must be verified
      # in Resend.
      EMAIL_KIND: ${EMAIL_KIND:-logging}
      EMAIL_RESEND_APIKEY: ${EMAIL_RESEND_APIKEY:-}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-}
      EMAIL_REPLY_TO: ${EMAIL_REPLY_TO:-}
      # --- OAuth providers (empty = provider disabled) ---
      OAUTH_APPLE_CLIENTID: ${OAUTH_APPLE_CLIENTID:-}
      OAUTH_GOOGLE_CLIENTID: ${OAUTH_GOOGLE_CLIENTID:-}
      OAUTH_X_CLIENTID: ${OAUTH_X_CLIENTID:-}
      # --- Admin (bearer token for /admin/*; empty = endpoints disabled) ---
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      # --- Billing ---
      BILLING_ENFORCEMENT_ENABLED: ${BILLING_ENFORCEMENT_ENABLED:-true}
      BILLING_COLD_STORAGE_PATH: ${BILLING_COLD_STORAGE_PATH:-}
      REVENUECAT_WEBHOOK_SECRET: ${REVENUECAT_WEBHOOK_SECRET:-}
      # --- Usage metering ---
      USAGE_FREE_MTOK_DAILY: ${USAGE_FREE_MTOK_DAILY:-1.0}
      USAGE_PER_SKILL_MTOK_DAILY: ${USAGE_PER_SKILL_MTOK_DAILY:-0.2}
      USAGE_DEGRADE_MODEL: ${USAGE_DEGRADE_MODEL:-hermes-3-small}
      # --- Rate limiting ---
      RATE_LIMIT_STORAGE_KIND: ${RATE_LIMIT_STORAGE_KIND:-memory}
      # --- SMS / phone auth ---
      SMS_KIND: ${SMS_KIND:-logging}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      # NOTE: PHONE_FIXED_OTP / MAGIC_FIXED_OTP are dev/CI backdoors only;
      # never set them in production — anyone with the value can sign in
      # as any user through those flows.
      # --- Hermes ---
      HERMES_GATEWAYKIND: ${HERMES_GATEWAYKIND:-filesystem}
      HERMES_GATEWAYURL: ${HERMES_GATEWAYURL:-http://hermes:8642}
      HERMES_APIKEY: ${HERMES_API_KEY:?HERMES_API_KEY required (32-byte hex; same value passed to hermes service)}
      HERMES_DATAROOT: /app/data/hermes
      HERMES_DEFAULTMODEL: ${HERMES_DEFAULTMODEL:-hermes-3}
      # HER-XXX — default to the Mnemosyne-baked image so new tenant containers
      # ship persistent memory. Build it on this host (`make hermes-image`) or
      # override with a pinned registry digest.
      HERMES_PER_TENANT_IMAGE: ${HERMES_PER_TENANT_IMAGE:-luminavault-hermes:local}
      HERMES_PER_TENANT_NETWORK: ${HERMES_PER_TENANT_NETWORK:-luminavault-hermes-net}
      HERMES_PER_TENANT_DATA_ROOT_BASE: ${HERMES_PER_TENANT_DATA_ROOT_BASE:-/app/data/hermes-tenants}
      HERMES_PER_TENANT_PORT_RANGE_START: ${HERMES_PER_TENANT_PORT_RANGE_START:-9000}
      HERMES_PER_TENANT_PORT_RANGE_END: ${HERMES_PER_TENANT_PORT_RANGE_END:-9500}
      HERMES_PER_TENANT_IDLE_TTL_SECONDS: ${HERMES_PER_TENANT_IDLE_TTL_SECONDS:-1800}
      DOCKER_BINARY_PATH: ${DOCKER_BINARY_PATH:-/usr/bin/docker}
      LV_SECRET_MASTER_KEY: ${LV_SECRET_MASTER_KEY:-}
      LV_ENVIRONMENT: ${LV_ENVIRONMENT:-production}
      BYO_HERMES_ALLOW_PRIVATE: ${BYO_HERMES_ALLOW_PRIVATE:-false}
      # Must be VAULT_ROOT_PATH (swift-configuration maps `vault.rootPath` →
      # VAULT_ROOT_PATH). The old `VAULT_ROOTPATH` never matched, so the app
      # fell through to `.env`'s VAULT_ROOT_PATH=/var/lib/luminavault — an
      # unmounted ephemeral path wiped on every rebuild, orphaning vault rows.
      VAULT_ROOT_PATH: /app/data/luminavault
      # --- CORS (prod MUST set explicit origins) ---
      CORS_ALLOWEDORIGINS: ${CORS_ALLOWEDORIGINS:?required}
      # --- WebAuthn ---
      WEBAUTHN_ENABLED: ${WEBAUTHN_ENABLED:-false}
      WEBAUTHN_RELYINGPARTYID: ${WEBAUTHN_RELYINGPARTYID:-}
      WEBAUTHN_RELYINGPARTYNAME: ${WEBAUTHN_RELYINGPARTYNAME:-LuminaVault}
      WEBAUTHN_RELYINGPARTYORIGIN: ${WEBAUTHN_RELYINGPARTYORIGIN:-}
      # --- APNS ---
      APNS_ENABLED: ${APNS_ENABLED:-false}
      APNS_BUNDLEID: ${APNS_BUNDLEID:-}
      APNS_TEAMID: ${APNS_TEAMID:-}
      APNS_KEYID: ${APNS_KEYID:-}
      APNS_PRIVATEKEYPATH: ${APNS_PRIVATEKEYPATH:-/app/secrets/apns-key.p8}
      APNS_ENVIRONMENT: ${APNS_ENVIRONMENT:-production}
      # --- LLM providers (OpenAI-compatible; empty APIKEY = unregistered) ---
      LLM_PROVIDER_TOGETHER_APIKEY: ${LLM_PROVIDER_TOGETHER_APIKEY:-}
      LLM_PROVIDER_TOGETHER_BASEURL: ${LLM_PROVIDER_TOGETHER_BASEURL:-}
      LLM_PROVIDER_GROQ_APIKEY: ${LLM_PROVIDER_GROQ_APIKEY:-}
      LLM_PROVIDER_GROQ_BASEURL: ${LLM_PROVIDER_GROQ_BASEURL:-}
      LLM_PROVIDER_FIREWORKS_APIKEY: ${LLM_PROVIDER_FIREWORKS_APIKEY:-}
      LLM_PROVIDER_FIREWORKS_BASEURL: ${LLM_PROVIDER_FIREWORKS_BASEURL:-}
      LLM_PROVIDER_DEEPINFRA_APIKEY: ${LLM_PROVIDER_DEEPINFRA_APIKEY:-}
      LLM_PROVIDER_DEEPINFRA_BASEURL: ${LLM_PROVIDER_DEEPINFRA_BASEURL:-}
      LLM_PROVIDER_DEEPSEEKDIRECT_APIKEY: ${LLM_PROVIDER_DEEPSEEKDIRECT_APIKEY:-}
      LLM_PROVIDER_DEEPSEEKDIRECT_BASEURL: ${LLM_PROVIDER_DEEPSEEKDIRECT_BASEURL:-}
      LLM_PROVIDER_XAI_APIKEY: ${LLM_PROVIDER_XAI_APIKEY:-}
      LLM_PROVIDER_XAI_BASEURL: ${LLM_PROVIDER_XAI_BASEURL:-}
      LLM_PROVIDER_OPENAI_APIKEY: ${LLM_PROVIDER_OPENAI_APIKEY:-}
      LLM_PROVIDER_OPENAI_BASEURL: ${LLM_PROVIDER_OPENAI_BASEURL:-}
      LLM_PROVIDER_OPENROUTER_APIKEY: ${LLM_PROVIDER_OPENROUTER_APIKEY:-}
      LLM_PROVIDER_OPENROUTER_BASEURL: ${LLM_PROVIDER_OPENROUTER_BASEURL:-}
      LLM_PROVIDER_ANTHROPIC_APIKEY: ${LLM_PROVIDER_ANTHROPIC_APIKEY:-}
      LLM_PROVIDER_ANTHROPIC_BASEURL: ${LLM_PROVIDER_ANTHROPIC_BASEURL:-}
      LLM_PROVIDER_OLLAMA_BASEURL: ${LLM_PROVIDER_OLLAMA_BASEURL:-}
      # --- Gemini (vision / multimodal fallback) ---
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # --- TTS ---
      TTS_PROVIDER: ${TTS_PROVIDER:-openai}
      TTS_DEFAULT_MODEL: ${TTS_DEFAULT_MODEL:-tts-1}
      TTS_CHARACTERS_DAILY: ${TTS_CHARACTERS_DAILY:-1000000}
      # --- Vision embeddings ---
      VISION_EMBED_PROVIDER: ${VISION_EMBED_PROVIDER:-cohere}
      VISION_EMBED_PROVIDER_COHERE_APIKEY: ${VISION_EMBED_PROVIDER_COHERE_APIKEY:-}
      VISION_EMBED_PROVIDER_COHERE_BASEURL: ${VISION_EMBED_PROVIDER_COHERE_BASEURL:-}
      VISION_EMBED_PROVIDER_COHERE_MODEL: ${VISION_EMBED_PROVIDER_COHERE_MODEL:-embed-english-v3.0}
      # --- STT / Transcribe ---
      TRANSCRIBE_PROVIDER: ${TRANSCRIBE_PROVIDER:-groq}
      TRANSCRIBE_PROVIDER_GROQ_APIKEY: ${TRANSCRIBE_PROVIDER_GROQ_APIKEY:-}
      TRANSCRIBE_PROVIDER_GROQ_BASEURL: ${TRANSCRIBE_PROVIDER_GROQ_BASEURL:-https://api.groq.com}
      TRANSCRIBE_PROVIDER_GROQ_MODEL: ${TRANSCRIBE_PROVIDER_GROQ_MODEL:-whisper-large-v3}
      TRANSCRIBE_RATECARD_GROQ_MTOKPERSECOND: ${TRANSCRIBE_RATECARD_GROQ_MTOKPERSECOND:-0.0001}
      # --- Observability (app → otel-collector → {jaeger, posthog, debug}) ---
      OTEL_ENABLED: ${OTEL_ENABLED:-true}
      OTEL_SERVICENAME: luminavault
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-collector:4317}
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: ${OTEL_EXPORTER_OTLP_LOGS_ENDPOINT:-http://otel-collector:4318/v1/logs}
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      LOG_LEVEL: ${LOG_LEVEL:-info}
    deploy:
      resources:
        limits:
          memory: 1024M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health | grep -q ok || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      hermes:
        condition: service_started
      otel-collector:
        condition: service_started

  postgres:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hermes_db}
      POSTGRES_USER: ${POSTGRES_USER:-hermes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - ./data/postgres18:/var/lib/postgresql
    deploy:
      resources:
        limits:
          memory: 1024M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hermes} -d ${POSTGRES_DB:-hermes_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  hermes:
    # HER-XXX — Mnemosyne-baked image (kb-* skills + `mnemosyne` memory MCP).
    # Built from docker/hermes.Dockerfile; the `image:` tag matches the
    # per-tenant default so per-tenant `docker run` reuses the same local image.
    build:
      context: .
      dockerfile: docker/hermes.Dockerfile
    image: luminavault-hermes:local
    restart: unless-stopped
    command: gateway run
    volumes:
      - ./data/hermes:/opt/data
    environment:
      HERMES_HOME: /opt/data
      # api_server platform — required for hummingbird → hermes routing.
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: "8642"
      API_SERVER_MODEL_NAME: ${HERMES_DEFAULTMODEL:-hermes-3}
      API_SERVER_KEY: ${HERMES_API_KEY:?HERMES_API_KEY required (32-byte hex; rotate with `make hermes-bootstrap` and restart stack)}
      # HER-XXX — Mnemosyne memory store on the persisted /opt/data volume.
      MNEMOSYNE_DATA_DIR: /opt/data/mnemosyne
    deploy:
      resources:
        limits:
          memory: 2048M
    depends_on:
      postgres:
        condition: service_healthy

  jaeger:
    image: jaegertracing/all-in-one:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:16686:16686" # UI bound to localhost only — front behind ssh tunnel
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    deploy:
      resources:
        limits:
          memory: 512M

  otel-collector:
    # HER-236: front door for all OTel signals — fans traces → jaeger,
    # logs → PostHog, traces/logs → Sentry, metrics → debug.
    image: otel/opentelemetry-collector-contrib:0.152.0
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.production.yaml:/etc/otel-collector-config.yaml:ro
    environment:
      POSTHOG_OTEL_TOKEN: ${POSTHOG_OTEL_TOKEN:?required}
      SENTRY_BASE_URL: ${SENTRY_BASE_URL:-https://sentry.io}
      SENTRY_ORG_SLUG: ${SENTRY_ORG_SLUG:?required}
      SENTRY_PROJECT_SLUG: ${SENTRY_PROJECT_SLUG:?required}
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:?required}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-unknown}
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      jaeger:
        condition: service_started

  # HER-131 — nightly encrypted off-site backups (pg_dump + vault/hermes tars,
  # age-encrypted, rclone-copied to B2/S3). Opt-in: gated behind the `backup`
  # profile so the default deploy is unchanged until an operator configures the
  # age recipient + rclone remote. Enable with:
  #   docker compose -p prod -f docker-compose.production.yml \
  #     --profile backup --env-file .env.production up -d backup
  # See docs/backup.md for one-time setup (age keypair + rclone.conf) and the
  # restore procedure.
  backup:
    build:
      context: .
      dockerfile: docker/backup.Dockerfile
    image: luminavault-backup:local
    restart: unless-stopped
    profiles: ["backup"]
    volumes:
      - ./data/luminavault:/backup/src/luminavault:ro # tenant raw vault (read-only)
      - ./data/hermes:/backup/src/hermes:ro           # hermes skills + memory (read-only)
      - ./secrets/rclone.conf:/root/.config/rclone/rclone.conf:ro
      - ./data/backup-logs:/var/log/backup
    environment:
      # --- Postgres (logical dump over the network) ---
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: ${POSTGRES_DB:-hermes_db}
      POSTGRES_USER: ${POSTGRES_USER:-hermes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      # --- Backup config ---
      BACKUP_CRON: ${BACKUP_CRON:-0 3 * * *}
      BACKUP_AGE_RECIPIENT: ${BACKUP_AGE_RECIPIENT:?set BACKUP_AGE_RECIPIENT (age recipient public key) to enable the backup profile}
      BACKUP_RCLONE_REMOTE: ${BACKUP_RCLONE_REMOTE:?set BACKUP_RCLONE_REMOTE (e.g. b2:bucket/luminavault) to enable the backup profile}
      BACKUP_RETAIN_DAILY: ${BACKUP_RETAIN_DAILY:-7}
      BACKUP_RETAIN_WEEKLY: ${BACKUP_RETAIN_WEEKLY:-4}
      BACKUP_RETAIN_MONTHLY: ${BACKUP_RETAIN_MONTHLY:-6}
      BACKUP_WEEKLY_DOW: ${BACKUP_WEEKLY_DOW:-7}
      BACKUP_RUN_ON_START: ${BACKUP_RUN_ON_START:-false}
      # Failure alerting (optional). Slack-compatible incoming-webhook URL;
      # empty = log only. BACKUP_ALERT_ON_SUCCESS also pings on green runs.
      BACKUP_ALERT_WEBHOOK: ${BACKUP_ALERT_WEBHOOK:-}
      BACKUP_ALERT_ON_SUCCESS: ${BACKUP_ALERT_ON_SUCCESS:-false}
      TZ: ${BACKUP_TZ:-UTC}
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      postgres:
        condition: service_healthy

networks:
  default:
    name: hermes-prod-net
