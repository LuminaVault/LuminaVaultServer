services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: hermes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hermes_db
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-luminavault}
    ports:
      - "5433:5432"
    volumes:
      - ./data/postgres18:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes -d hermes_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  hermes:
    # HER-276 — custom image bakes `hermes-skills/` (kb-compile, kb-ingest,
    # kb-import, kb-merge-vault, kb-output) at `/opt/baked-skills`. The
    # entrypoint seeds them into `/opt/data/skills/` on each start
    # (no-clobber), so a fresh `docker compose up --build` ships the
    # full kb-* catalog without a manual `cp`.
    build:
      context: .
      dockerfile: docker/hermes.Dockerfile
    image: luminavault-hermes:local
    container_name: hermes-agent
    restart: unless-stopped
    command: ["gateway", "run"]
    ports:
      - "8642:8642" # OpenAI-compatible gateway (Hummingbird calls this)
    volumes:
      - ./data/hermes:/opt/data
    environment:
      HERMES_HOME: /opt/data
      # Enable OpenAI-compatible HTTP server on 8642 (gateway api_server adapter)
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0   # default 127.0.0.1 won't accept cross-container traffic
      API_SERVER_PORT: "8642"
      API_SERVER_MODEL_NAME: hermes-3
      # Required so the api_server platform agrees to bind to 0.0.0.0; LuminaVault sends this as Bearer.
      # Generate via `make hermes-bootstrap` if missing.
      API_SERVER_KEY: ${HERMES_API_KEY:?HERMES_API_KEY required — run `make hermes-bootstrap` to generate}
      # HER-XXX — Mnemosyne memory store on the persisted /opt/data volume.
      MNEMOSYNE_DATA_DIR: /opt/data/mnemosyne
    depends_on:
      postgres:
        condition: service_healthy

  # Photon sidecar (central Node.js bridge for the free iMessage path via spectrum-ts).
  # Holds Spectrum clients per enabled tenant/project, forwards inbound events to the
  # main API's public webhook, and accepts control calls (activate/send) from the Swift server.
  # See docker/photon-sidecar/README.md and the Photon plan.
  photon-sidecar:
    build:
      context: .
      dockerfile: docker/photon-sidecar/Dockerfile
    # image: ghcr.io/.../luminavault-photon-sidecar:latest   # for prod/CI builds
    container_name: luminavault-photon-sidecar
    restart: unless-stopped
    ports:
      - "8789:8789"   # local control surface (optional, useful for dev debugging)
    environment:
      # Where the sidecar should POST normalized inbound events (the public webhook surface)
      LUMINA_API_INTERNAL_URL: http://hummingbird:8080
      LUMINA_PHOTON_WEBHOOK_PATH: /v1/gateways/photon/inbound
      # Shared secret for control plane calls from the Swift server (generate a real one for real deploys)
      LUMINA_SIDECAR_TOKEN: ${LUMINA_SIDECAR_TOKEN:-dev-photon-sidecar-token-change-me}
      PHOTON_SIDECAR_PORT: 8789
      # PHOTON_SIDECAR_BIND: 0.0.0.0
    networks:
      - default
    # depends_on:
    #   hummingbird:
    #     condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8789/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  plugin-runner:
    build:
      context: .
      dockerfile: docker/plugin-runner.Dockerfile
    container_name: luminavault-plugin-runner
    restart: unless-stopped
    read_only: true
    cap_drop: ["ALL"]
    security_opt: ["no-new-privileges:true"]
    pids_limit: 64
    tmpfs: ["/tmp:size=16m,mode=1777"]
    environment:
      PLUGIN_RUNNER_TOKEN: ${PLUGIN_RUNNER_TOKEN:-dev-plugin-runner-token-change-me-32}
      RUST_LOG: debug
    expose: ["8090"]
    healthcheck:
      test: ["CMD", "/usr/local/bin/plugin-runner", "--healthcheck"]
      interval: 15s
      timeout: 3s
      retries: 5

  hummingbird:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: hermes-hummingbird
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - .:/app # source mount for fast iteration
      # Linux SwiftPM artifacts/cache. Keep them out of the macOS `.build`
      # directory while avoiding OrbStack's Docker volume quota.
      - ./data/swift-build:/app/.build
      - ./data/swiftpm-cache:/root/.cache
      - ./data/luminavault:/app/data/luminavault # tenant raw vault root
    environment:
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 8080
      # --- Postgres ---
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: hermes_db
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-luminavault}
      FLUENT_AUTOMIGRATE: "true"
      # --- Rate limiting ---
      RATE_LIMIT_STORAGE_KIND: ${RATE_LIMIT_STORAGE_KIND:-memory}
      REDIS_URL: ${REDIS_URL:-}
      # --- Auth ---
      JWT_HMAC_SECRET: ${JWT_HMAC_SECRET:-dev-secret-32chars-not-for-prod-x}
      JWT_KID: lv-dev
      # At-rest encryption master key. Without it SecretBox is not built and
      # the BYOK providers + BYO Hermes routes never mount (404).
      LV_SECRET_MASTER_KEY: ${LV_SECRET_MASTER_KEY:-}
      PLUGIN_RUNNER_URL: http://plugin-runner:8090
      PLUGIN_RUNNER_TOKEN: ${PLUGIN_RUNNER_TOKEN:-dev-plugin-runner-token-change-me-32}
      PLUGIN_ARTIFACT_ROOT: /app/data/plugin-artifacts
      ADMIN_TOKEN: ${ADMIN_TOKEN:-}
      # OAuth providers — interpolated from .env so dev matches configured IDs.
      OAUTH_APPLE_CLIENTID: ${OAUTH_APPLE_CLIENTID:-}
      OAUTH_GOOGLE_CLIENTID: ${OAUTH_GOOGLE_CLIENTID:-}
      OAUTH_X_CLIENTID: ${OAUTH_X_CLIENTID:-}
      # Passkeys / WebAuthn.
      WEBAUTHN_ENABLED: ${WEBAUTHN_ENABLED:-false}
      WEBAUTHN_RELYINGPARTYID: ${WEBAUTHN_RELYINGPARTYID:-localhost}
      WEBAUTHN_RELYINGPARTYNAME: ${WEBAUTHN_RELYINGPARTYNAME:-LuminaVault}
      WEBAUTHN_RELYINGPARTYORIGIN: ${WEBAUTHN_RELYINGPARTYORIGIN:-http://localhost:8080}
      # Phone OTP + email magic-link delivery. Default to logging (OTP→stderr);
      # set SMS_KIND=twilio / EMAIL_KIND=resend + creds for real delivery.
      SMS_KIND: ${SMS_KIND:-logging}
      EMAIL_KIND: ${EMAIL_KIND:-logging}
      TEAM_INVITE_BASE_URL: ${TEAM_INVITE_BASE_URL:-http://localhost:5173}
      # --- Hermes profile + chat ---
      HERMES_GATEWAYKIND: filesystem
      HERMES_GATEWAYURL: http://hermes:8642
      HERMES_APIKEY: ${HERMES_API_KEY:?HERMES_API_KEY required — run `make hermes-bootstrap` to generate}
      HERMES_DATAROOT: /app/data/hermes
      HERMES_DEFAULTMODEL: hermes-3
      # --- Cerberus model orchestration ---
      CERBERUS_EXECUTION_MODE: ${CERBERUS_EXECUTION_MODE:-active}
      CERBERUS_ENSEMBLES_ENABLED: ${CERBERUS_ENSEMBLES_ENABLED:-false}
      CERBERUS_PARALLEL_ENABLED: ${CERBERUS_PARALLEL_ENABLED:-false}
      HYBRID_EXECUTION_ENABLED: ${HYBRID_EXECUTION_ENABLED:-false}
      LOCAL_EXECUTION_TOOL_BROKER_ENABLED: ${LOCAL_EXECUTION_TOOL_BROKER_ENABLED:-false}
      KNOWLEDGE_GRAPH_WORKER_ENABLED: ${KNOWLEDGE_GRAPH_WORKER_ENABLED:-false}
      # Must be VAULT_ROOT_PATH (swift-configuration maps `vault.rootPath` →
      # VAULT_ROOT_PATH). The old `VAULT_ROOTPATH` never matched, so the app
      # fell through to `.env`'s VAULT_ROOT_PATH=/var/lib/luminavault — an
      # unmounted container path that was WIPED on every rebuild, orphaning
      # vault_files rows and breaking Sync & Learn. This mounted path persists.
      VAULT_ROOT_PATH: /app/data/luminavault
      # --- Observability (app → otel-collector → {jaeger, posthog, debug}) ---
      OTEL_ENABLED: "true"
      OTEL_SERVICENAME: luminavault
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: http://otel-collector:4318/v1/logs
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      LOG_LEVEL: debug
      # --- CORS (dev = wildcard) ---
      CORS_ALLOWEDORIGINS: ""
    healthcheck:
      # /health returns 200 with an empty body — check status, not body.
      # `curl -f` fails on non-2xx; image installs curl (see Dockerfile.dev).
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      hermes:
        condition: service_started
      plugin-runner:
        condition: service_healthy
      otel-collector:
        condition: service_started

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: hermes-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686" # UI -> http://localhost:16686
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  otel-collector:
    # HER-236: front door for all OTel signals — fans traces → jaeger,
    # logs → debug (PostHog OTel logs returns 404 in cloud; revisit
    # when the endpoint is enabled), metrics → debug (future: prometheus).
    image: otel/opentelemetry-collector-contrib:0.152.0
    container_name: hermes-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    environment:
      POSTHOG_OTEL_TOKEN: ${POSTHOG_OTEL_TOKEN:-}
    ports:
      - "4317:4317" # OTLP gRPC (metrics + traces from app)
      - "4318:4318" # OTLP HTTP (logs from app)
      - "13133:13133" # health_check extension
    depends_on:
      jaeger:
        condition: service_started

networks:
  default:
    name: hermes-local-net
