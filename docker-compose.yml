services:
  postgres:
    image: pgvector/pgvector:pg18
    container_name: hermes-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hermes_db
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-luminavault}
    ports:
      - "5433:5432"
    volumes:
      - ./data/postgres18:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hermes -d hermes_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-agent
    restart: unless-stopped
    command: gateway run
    ports:
      - "8642:8642" # OpenAI-compatible gateway (Hummingbird calls this)
    volumes:
      - ./data/hermes:/opt/data
    environment:
      HERMES_HOME: /opt/data
      # Enable OpenAI-compatible HTTP server on 8642 (gateway api_server adapter)
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0   # default 127.0.0.1 won't accept cross-container traffic
      API_SERVER_PORT: "8642"
      API_SERVER_MODEL_NAME: hermes-3
      # Required so the api_server platform agrees to bind to 0.0.0.0; LuminaVault sends this as Bearer.
      # Generate via `make hermes-bootstrap` if missing.
      API_SERVER_KEY: ${HERMES_API_KEY:?HERMES_API_KEY required — run `make hermes-bootstrap` to generate}
    depends_on:
      postgres:
        condition: service_healthy

  hummingbird:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: hermes-hummingbird
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - .:/app # source mount for fast iteration
      - ./data/luminavault:/app/data/luminavault # tenant raw vault root
    environment:
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 8080
      # --- Postgres ---
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DATABASE: hermes_db
      POSTGRES_USER: hermes
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-luminavault}
      FLUENT_AUTOMIGRATE: "true"
      # --- Auth ---
      JWT_HMAC_SECRET: ${JWT_HMAC_SECRET:-dev-secret-32chars-not-for-prod-x}
      JWT_KID: lv-dev
      # --- Hermes profile + chat ---
      HERMES_GATEWAYKIND: filesystem
      HERMES_GATEWAYURL: http://hermes:8642
      HERMES_APIKEY: ${HERMES_API_KEY:?HERMES_API_KEY required — run `make hermes-bootstrap` to generate}
      HERMES_DATAROOT: /app/data/hermes
      HERMES_DEFAULTMODEL: hermes-3
      VAULT_ROOTPATH: /app/data/luminavault
      # --- Observability (app → otel-collector → {jaeger, posthog, debug}) ---
      OTEL_ENABLED: "true"
      OTEL_SERVICENAME: luminavault
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: http://otel-collector:4318/v1/logs
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      LOG_LEVEL: debug
      # --- CORS (dev = wildcard) ---
      CORS_ALLOWEDORIGINS: ""
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health | grep -q ok || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      hermes:
        condition: service_started
      otel-collector:
        condition: service_started

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: hermes-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686" # UI -> http://localhost:16686
    environment:
      COLLECTOR_OTLP_ENABLED: "true"

  otel-collector:
    # HER-236: front door for all OTel signals — fans traces → jaeger,
    # logs → PostHog, metrics → debug (future: prometheus exporter).
    image: otel/opentelemetry-collector-contrib:0.152.0
    container_name: hermes-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    environment:
      POSTHOG_OTEL_TOKEN: ${POSTHOG_OTEL_TOKEN:-}
    ports:
      - "4317:4317" # OTLP gRPC (metrics + traces from app)
      - "4318:4318" # OTLP HTTP (logs from app)
      - "13133:13133" # health_check extension
    depends_on:
      jaeger:
        condition: service_started

networks:
  default:
    name: hermes-local-net
