receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317   # metrics + traces from the app (swift-otel OTLPGRPC exporters)
      http:
        endpoint: 0.0.0.0:4318   # logs from the app (OTLPHTTPLogExporter)

processors:
  batch: {}

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  # PostHog's OTLP ingest currently only accepts traces; the logs path
  # (`/otlp/v1/logs`) returns 404 and the collector drops every batch.
  # Keep the exporter definition commented for future revival once
  # PostHog Cloud exposes OTLP logs; routing logs to `debug` in the
  # meantime so the pipeline still drains.
  #
  # otlphttp/posthog:
  #   logs_endpoint: https://us.i.posthog.com/otlp/v1/logs
  #   headers:
  #     Authorization: "Bearer ${env:POSTHOG_OTEL_TOKEN}"
  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
